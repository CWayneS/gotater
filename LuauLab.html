    const editor = document.getElementById('code-editor');
    editor.addEventListener('input', () => {
      Progress.saveEditorCode(`quest-${quest.id}`, editor.value);
    });
    handleTab(editor);
  }

  // ── SANDBOX SCREEN ──
  function renderSandbox() {
    const savedCode = Progress.getEditorCode('sandbox');
    const screen = document.getElementById('screen-sandbox');
    screen.innerHTML = `
      <div class="lesson-instructions" style="padding:28px 32px">
        <h2>Sandbox</h2>
        <p>A free-form coding area where you can experiment with Luau code. There are no challenges or checks here — just you and the language.</p>
        <div class="lesson-tip">
          <div class="lesson-tip-label">💡 What works here</div>
          <p>The simulator supports: print(), variables, math, strings, string interpolation, if/else, for loops, while loops, tables, and table operations. Roblox-specific APIs (Instance, workspace, etc.) won't work here.</p>
        </div>
        <h3>Quick Reference</h3>
        <div class="lesson-code-block"><pre>print("Hello!")          -- Output text
local x = 42             -- Variables
local s = \`2 + 2 = {2+2}\`  -- Interpolation
if x > 10 then ... end   -- Conditionals
for i = 1, 5 do ... end  -- Loops
local t = {1, 2, 3}      -- Tables</pre></div>
      </div>
      <div class="lesson-editor-panel">
        <div class="editor-header">
          <span class="editor-header-label">Sandbox Editor</span>
          <div class="editor-header-spacer"></div>
          <button class="editor-btn editor-btn-clear" onclick="App.clearOutput()">Clear</button>
          <button class="editor-btn editor-btn-run" onclick="App.runCode()">▶ Run</button>
        </div>
        <textarea class="editor-textarea" id="code-editor" spellcheck="false" placeholder="-- Write anything you want!\n">${savedCode || '-- Sandbox: experiment freely!\nlocal name = "World"\nprint(`Hello, {name}!`)\n\nfor i = 1, 5 do\n    print(`Number {i}`)\nend\n'}</textarea>
        <div class="output-header"><span class="output-header-label">Output</span></div>
        <div class="output-area" id="output-area"></div>
        <div class="lesson-nav-footer"><div></div><div></div><div></div></div>
      </div>
    `;
    screen.classList.add('active');
    setTopbar('Sandbox', 'Free Play');

    const editor = document.getElementById('code-editor');
    editor.addEventListener('input', () => {
      Progress.saveEditorCode('sandbox', editor.value);
    });
    handleTab(editor);
  }

  // ── SETTINGS SCREEN ──
  function renderSettings() {
    const stats = Progress.getTotalStats();
    const totalLessons = AllUnits.reduce((s, u) => s + u.lessons.length, 0);

    const screen = document.getElementById('screen-settings');
    screen.innerHTML = `
      <div class="unit-header">
        <div class="unit-header-title">Settings</div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title">Progress</div>
        <div class="settings-row"><label>Lessons completed</label><span>${stats.lessonsCompleted} / ${totalLessons}</span></div>
        <div class="settings-row"><label>Quests completed</label><span>${stats.questsCompleted} / ${Quests.length}</span></div>
        <div class="settings-row"><label>Started</label><span>${new Date(stats.startedAt).toLocaleDateString()}</span></div>
        <div class="settings-row"><label>Last updated</label><span>${new Date(stats.updatedAt).toLocaleDateString()}</span></div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title">Save / Load Progress</div>
        <div class="settings-row">
          <label>Export progress as JSON file</label>
          <button class="topbar-btn" onclick="Progress.exportJSON()">📥 Export</button>
        </div>
        <div class="settings-row">
          <label>Import progress from JSON file</label>
          <button class="topbar-btn" onclick="document.getElementById('import-file').click()">📤 Import</button>
          <input type="file" id="import-file" accept=".json" style="display:none" onchange="App.handleImport(event)">
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title" style="color:var(--red)">Danger Zone</div>
        <div class="settings-row">
          <label>Reset all progress and saved code</label>
          <button class="topbar-btn" style="border-color:var(--red);color:var(--red)" onclick="App.handleReset()">🗑️ Reset All</button>
        </div>
      </div>
    `;
    screen.classList.add('active');
    setTopbar('Settings', '');
  }

  // ── Hint Drawer Builder ──
  function buildHintDrawer(challenge) {
    if (!challenge || !challenge.hint1) return '';
    const escapedSolution = challenge.solution ? escapeHtml(challenge.solution) : '';
    return `
      <div class="hint-drawer-toggle" onclick="App.toggleHintDrawer()">
        <span class="hint-drawer-toggle-label">💡 Need Help?</span>
        <span class="hint-drawer-toggle-arrow">▲</span>
      </div>
      <div class="hint-drawer-body" id="hint-drawer-body">
        <div class="hint-drawer-content">
          <div class="hint-stage" id="hint-stage-1">
            <button class="hint-stage-btn" onclick="App.revealHint(1)">🔍 Show Hint</button>
            <div class="hint-stage-text" id="hint-text-1">${escapeHtml(challenge.hint1)}</div>
          </div>
          <div class="hint-stage" id="hint-stage-2" style="display:none">
            <button class="hint-stage-btn" onclick="App.revealHint(2)">🔎 Show Bigger Hint</button>
            <div class="hint-stage-text" id="hint-text-2">${escapeHtml(challenge.hint2 || '')}</div>
          </div>
          <div class="hint-stage" id="hint-stage-3" style="display:none">
            <button class="hint-stage-btn solution-btn" onclick="App.revealHint(3)">🔓 Show Full Solution</button>
            <div class="hint-stage-text solution-text" id="hint-text-3"><pre>${escapedSolution}</pre>
              <button class="hint-copy-btn" onclick="App.copySolution()">📋 Copy to Editor</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  let hintDrawerOpen = false;
  let hintStage = 0;

  function toggleHintDrawer() {
    hintDrawerOpen = !hintDrawerOpen;
    const body = document.getElementById('hint-drawer-body');
    const toggle = document.querySelector('.hint-drawer-toggle');
    if (body) body.classList.toggle('open', hintDrawerOpen);
    if (toggle) toggle.classList.toggle('open', hintDrawerOpen);
  }

  function revealHint(stage) {
    if (stage <= hintStage) return;
    hintStage = stage;
    const text = document.getElementById(`hint-text-${stage}`);
    const btn = document.querySelector(`#hint-stage-${stage} .hint-stage-btn`);
    if (text) text.classList.add('visible');
    if (btn) btn.classList.add('revealed');
    if (stage < 3) {
      const nextStage = document.getElementById(`hint-stage-${stage + 1}`);
      if (nextStage) nextStage.style.display = 'block';
    }
  }

  function copySolution() {
    const editor = document.getElementById('code-editor');
    const solutionPre = document.querySelector('#hint-text-3 pre');
    if (editor && solutionPre) {
      editor.value = solutionPre.textContent;
      editor.dispatchEvent(new Event('input'));
      const btn = document.querySelector('.hint-copy-btn');
      if (btn) {
        const original = btn.innerHTML;
        btn.innerHTML = '✅ Copied!';
        setTimeout(() => { btn.innerHTML = original; }, 1500);
      }
    }
  }

  // ── Content Renderer ──
  function renderContent(blocks) {
    return blocks.map(b => {
      switch (b.type) {
        case 'heading': return `<h2>${b.text}</h2>`;
        case 'heading3': return `<h3>${b.text}</h3>`;
        case 'paragraph': return `<p>${b.text}</p>`;
        case 'code': return `<div class="lesson-code-block"><pre>${escapeHtml(b.text)}</pre></div>`;
        case 'tip': return `<div class="lesson-tip"><div class="lesson-tip-label">${b.label || '💡 TIP'}</div><p>${b.text}</p></div>`;
        case 'warning': return `<div class="lesson-warning"><div class="lesson-tip-label">${b.label || '⚠️ WARNING'}</div><p>${b.text}</p></div>`;
        default: return '';
      }
    }).join('');
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Editor Actions ──
  function runCode() {
    const editor = document.getElementById('code-editor');
    if (!editor) return;
    const output = Editor.simulate(editor.value);
    displayOutput(output);
  }

  function clearOutput() {
    const area = document.getElementById('output-area');
    if (area) area.innerHTML = '';
  }

  function resetEditor() {
    const editor = document.getElementById('code-editor');
    if (!editor) return;

    let starterCode = '';
    if (currentScreen === 'lesson') {
      const unit = AllUnits.find(u => u.id === currentUnit);
      const lesson = unit ? unit.lessons.find(l => l.id === currentLesson) : null;
      starterCode = lesson ? lesson.starterCode || '' : '';
      Progress.saveEditorCode(`${currentUnit}-${currentLesson}`, starterCode);
    } else if (currentScreen === 'quest') {
      const quest = Quests.find(q => q.id === currentQuest);
      starterCode = quest ? quest.starterCode || '' : '';
      Progress.saveEditorCode(`quest-${currentQuest}`, starterCode);
    }
    editor.value = starterCode;
    clearOutput();
  }

  function checkCode() {
    const unit = AllUnits.find(u => u.id === currentUnit);
    const lesson = unit ? unit.lessons.find(l => l.id === currentLesson) : null;
    if (!lesson || !lesson.challenge) return;

    const editor = document.getElementById('code-editor');
    const output = Editor.simulate(editor.value);
    displayOutput(output);

    const result = Editor.checkOutput(output, lesson.challenge.expectedOutput);
    const area = document.getElementById('output-area');
    if (result.pass) {
      area.innerHTML += `<div class="output-line success">✅ ${result.message}</div>`;
      Progress.completeLesson(currentUnit, currentLesson);
      // Update the completion indicator
      const nav = document.querySelector('.lesson-nav-footer .text-muted');
      if (nav) nav.textContent = '✅ Completed';
    } else {
      area.innerHTML += `<div class="output-line error">❌ ${result.message}</div>`;
      if (lesson.challenge.hint) {
        area.innerHTML += `<div class="output-line info">💡 Hint: Check the lesson instructions and try again!</div>`;
      }
    }
  }

  function checkQuest() {
    const quest = Quests.find(q => q.id === currentQuest);
    if (!quest) return;

    const editor = document.getElementById('code-editor');
    const output = Editor.simulate(editor.value);
    displayOutput(output);

    const result = Editor.checkOutput(output, quest.challenge.expectedOutput);
    const area = document.getElementById('output-area');
    if (result.pass) {
      area.innerHTML += `<div class="output-line success">✅ Quest Complete! ${result.message}</div>`;
      Progress.completeQuest(quest.id);
      const nav = document.querySelector('.lesson-nav-footer .text-muted');
      if (nav) nav.textContent = '✅ Completed';
    } else {
      area.innerHTML += `<div class="output-line error">❌ ${result.message}</div>`;
    }
  }

  function displayOutput(output) {
    const area = document.getElementById('output-area');
    if (!area) return;
    area.innerHTML = output.map(o =>
      `<div class="output-line ${o.type === 'error' ? 'error' : o.type === 'info' ? 'info' : ''}">${escapeHtml(o.text)}</div>`
    ).join('');
  }

  // ── Tab key support in editor ──
  function handleTab(textarea) {
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        textarea.value = textarea.value.substring(0, start) + '    ' + textarea.value.substring(end);
        textarea.selectionStart = textarea.selectionEnd = start + 4;
      }
    });
  }

  // ── Keyboard shortcuts ──
  function setupKeyboard() {
    document.addEventListener('keydown', (e) => {
      // Ctrl+Enter to run
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runCode();
      }
    });
  }

  // ── Settings handlers ──
  function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    Progress.importJSON(file).then(() => {
      navigate('settings');
    }).catch(err => {
      alert('Failed to import: ' + err.message);
    });
  }

  function handleReset() {
    if (confirm('Are you sure? This will erase all progress and saved code.')) {
      Progress.reset();
      navigate('home');
    }
  }

  return {
    init, navigate, runCode, clearOutput, resetEditor,
    checkCode, checkQuest, handleImport, handleReset,
    toggleHintDrawer, revealHint, copySolution,
  };
})();

// Start the app
document.addEventListener('DOMContentLoaded', App.init);
</script>
</body>
</html>
