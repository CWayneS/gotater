<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luau Lab — Interactive Luau Programming Course</title>
<style>
/* ═══════════════════════════════════════════
   LUAU LAB — Navy/Blue/Cyan Theme
   ═══════════════════════════════════════════ */

:root {
  /* Core palette */
  --navy:        #0D1B2A;
  --dark-blue:   #1B2838;
  --mid-blue:    #2E4057;
  --panel-bg:    #152238;
  --card-bg:     #1B2F4A;
  --accent:      #00B4D8;
  --accent-dk:   #0077B6;
  --accent-glow: #00B4D840;
  --green:       #06D6A0;
  --green-dk:    #04A87D;
  --yellow:      #FFD166;
  --orange:      #F77F00;
  --red:         #EF476F;
  --purple:      #BB86FC;
  --white:       #E0E1DD;
  --light:       #CAF0F8;
  --body-gray:   #778DA9;
  --muted:       #415A77;
  --code-bg:     #0F1D2E;
  --code-border: #1E3A5F;
  --editor-bg:   #0A1628;
  --sidebar-w:   72px;
  --header-h:    0px;
  --radius:      8px;
  --radius-sm:   4px;
  --transition:  0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--navy);
  color: var(--white);
  overflow: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--mid-blue); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dk); }

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
#app {
  display: flex;
  width: 100%; height: 100%;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--dark-blue);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0;
  gap: 4px;
  border-right: 1px solid var(--mid-blue);
  z-index: 10;
}

.sidebar-logo {
  width: 40px; height: 40px;
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent);
  border-radius: var(--radius);
  font-weight: 800; font-size: 18px; color: var(--navy);
  user-select: none;
}

.sidebar-btn {
  width: 56px; height: 56px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  background: transparent;
  border: none; border-radius: var(--radius);
  color: var(--body-gray);
  cursor: pointer;
  font-size: 9px; font-weight: 600;
  transition: background var(--transition), color var(--transition);
  user-select: none;
}
.sidebar-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.sidebar-btn:hover { background: var(--mid-blue); color: var(--light); }
.sidebar-btn.active { background: var(--accent-dk); color: var(--white); }
.sidebar-btn.active svg { stroke: var(--white); }

.sidebar-spacer { flex: 1; }

/* ── Main content area ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top bar (inside main) ── */
#topbar {
  height: 48px; min-height: 48px;
  background: var(--dark-blue);
  border-bottom: 1px solid var(--mid-blue);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
}
#topbar-title {
  font-size: 15px; font-weight: 700; color: var(--accent);
}
#topbar-breadcrumb {
  font-size: 13px; color: var(--body-gray);
}
.topbar-spacer { flex: 1; }
.topbar-btn {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--mid-blue);
  background: transparent;
  color: var(--body-gray);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
.topbar-btn.primary { background: var(--accent); border-color: var(--accent); color: var(--navy); }
.topbar-btn.primary:hover { background: var(--accent-dk); }

/* ── Page container ── */
#page {
  flex: 1;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   SCREENS
   ═══════════════════════════════════════════ */
.screen {
  display: none;
  width: 100%; height: 100%;
}
.screen.active { display: flex; }

/* ── HOME SCREEN ── */
#screen-home {
  flex-direction: column;
  overflow-y: auto;
  padding: 32px 40px;
  gap: 28px;
}

.home-hero {
  text-align: center;
  padding: 40px 20px;
}
.home-hero h1 {
  font-size: 36px; font-weight: 800; color: var(--accent);
  margin-bottom: 8px;
}
.home-hero p {
  font-size: 16px; color: var(--body-gray); max-width: 500px; margin: 0 auto;
}

.home-section-title {
  font-size: 18px; font-weight: 700; color: var(--white);
  margin-bottom: 12px;
}

.units-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.unit-card {
  background: var(--card-bg);
  border: 1px solid var(--mid-blue);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.unit-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px var(--accent-glow);
}
.unit-card-number {
  font-size: 11px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 6px;
}
.unit-card-title {
  font-size: 17px; font-weight: 700; color: var(--white);
  margin-bottom: 8px;
}
.unit-card-desc {
  font-size: 13px; color: var(--body-gray); line-height: 1.5;
  margin-bottom: 14px;
}
.unit-card-progress {
  height: 4px; background: var(--mid-blue); border-radius: 2px;
  overflow: hidden;
}
.unit-card-progress-fill {
  height: 100%; background: var(--green); border-radius: 2px;
  transition: width 0.4s ease;
}
.unit-card-status {
  font-size: 11px; color: var(--body-gray); margin-top: 6px;
}

/* ── UNIT OVERVIEW SCREEN ── */
#screen-unit {
  flex-direction: column;
  overflow-y: auto;
  padding: 32px 40px;
  gap: 16px;
}

.unit-header {
  margin-bottom: 8px;
}
.unit-header-label {
  font-size: 12px; color: var(--accent); font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
}
.unit-header-title {
  font-size: 28px; font-weight: 800; color: var(--white);
  margin: 4px 0;
}
.unit-header-desc {
  font-size: 14px; color: var(--body-gray); max-width: 600px;
}

.lesson-list {
  display: flex; flex-direction: column; gap: 8px;
  max-width: 700px;
}

.lesson-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--card-bg);
  border: 1px solid var(--mid-blue);
  border-radius: var(--radius);
  padding: 14px 18px;
  cursor: pointer;
  transition: all var(--transition);
}
.lesson-item:hover {
  border-color: var(--accent);
  background: var(--panel-bg);
}
.lesson-item-num {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: var(--mid-blue);
  border-radius: 50%;
  font-size: 13px; font-weight: 700; color: var(--body-gray);
  flex-shrink: 0;
}
.lesson-item.completed .lesson-item-num {
  background: var(--green-dk);
  color: var(--white);
}
.lesson-item-info { flex: 1; }
.lesson-item-title {
  font-size: 14px; font-weight: 600; color: var(--white);
}
.lesson-item-desc {
  font-size: 12px; color: var(--body-gray); margin-top: 2px;
}
.lesson-item-check {
  width: 20px; height: 20px;
  color: var(--green);
  opacity: 0;
  transition: opacity var(--transition);
}
.lesson-item.completed .lesson-item-check { opacity: 1; }

/* ── COURSE OVERVIEW (Lessons tab) ── */
.course-unit-group {
  margin-bottom: 8px;
  max-width: 750px;
}
.course-unit-header {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--mid-blue);
  border-radius: var(--radius) var(--radius) 0 0;
  cursor: pointer;
  transition: all var(--transition);
}
.course-unit-header:hover { border-color: var(--accent); }
.course-unit-icon { font-size: 22px; }
.course-unit-info { flex: 1; }
.course-unit-label { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.course-unit-title { font-size: 15px; font-weight: 700; color: var(--white); }
.course-unit-progress-wrap { display: flex; align-items: center; gap: 8px; }
.course-unit-pct { font-size: 12px; color: var(--body-gray); min-width: 30px; text-align: right; }
.course-lesson-list {
  border: 1px solid var(--mid-blue);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
}
.course-lesson-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px 10px 24px;
  cursor: pointer;
  transition: background var(--transition);
  border-bottom: 1px solid var(--mid-blue);
}
.course-lesson-row:last-child { border-bottom: none; }
.course-lesson-row:hover { background: var(--panel-bg); }
.course-lesson-dot {
  width: 32px; min-width: 32px; text-align: center;
  font-size: 11px; font-weight: 700;
  color: var(--body-gray);
}
.course-lesson-row.completed .course-lesson-dot { color: var(--green); }
.course-lesson-title {
  font-size: 13px; font-weight: 600; color: var(--white);
  min-width: 140px;
}
.course-lesson-desc {
  font-size: 12px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── LESSON SCREEN ── */
#screen-lesson {
  flex-direction: row;
  overflow: hidden;
}

.lesson-instructions {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
  border-right: 1px solid var(--mid-blue);
  min-width: 0;
}

.lesson-instructions h2 {
  font-size: 22px; font-weight: 800; color: var(--white);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--accent);
}
.lesson-instructions h3 {
  font-size: 16px; font-weight: 700; color: var(--accent);
  margin: 20px 0 10px;
}
.lesson-instructions p {
  font-size: 14px; color: var(--body-gray); line-height: 1.7;
  margin-bottom: 14px;
}
.lesson-instructions p code {
  background: var(--code-bg);
  border: 1px solid var(--code-border);
  border-radius: var(--radius-sm);
  padding: 1px 6px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  color: var(--accent);
}

.lesson-code-block {
  background: var(--code-bg);
  border: 1px solid var(--code-border);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin: 12px 0 18px;
  overflow-x: auto;
}
.lesson-code-block pre {
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
  color: var(--light);
  white-space: pre;
}

.lesson-tip {
  border-left: 4px solid var(--green);
  background: var(--code-bg);
  padding: 12px 16px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 14px 0;
}
.lesson-tip-label {
  font-size: 11px; font-weight: 700; color: var(--green);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 4px;
}
.lesson-tip p {
  font-size: 13px; color: var(--body-gray); margin: 0;
}

.lesson-warning {
  border-left: 4px solid var(--yellow);
  background: var(--code-bg);
  padding: 12px 16px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 14px 0;
}
.lesson-warning .lesson-tip-label { color: var(--yellow); }

/* ── Editor panel ── */
.lesson-editor-panel {
  width: 45%;
  min-width: 360px;
  display: flex;
  flex-direction: column;
  background: var(--dark-blue);
}

.editor-header {
  display: flex; align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--mid-blue);
  gap: 8px;
}
.editor-header-label {
  font-size: 13px; font-weight: 600; color: var(--body-gray);
}
.editor-header-spacer { flex: 1; }

.editor-btn {
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.editor-btn-clear {
  background: transparent; color: var(--body-gray); border: 1px solid var(--mid-blue);
}
.editor-btn-clear:hover { border-color: var(--body-gray); color: var(--white); }
.editor-btn-run {
  background: var(--green); color: var(--navy);
}
.editor-btn-run:hover { background: var(--green-dk); }
.editor-btn-check {
  background: var(--accent); color: var(--navy);
}
.editor-btn-check:hover { background: var(--accent-dk); }
.editor-btn-reset {
  background: transparent; color: var(--body-gray); border: 1px solid var(--mid-blue);
}
.editor-btn-reset:hover { border-color: var(--orange); color: var(--orange); }

.editor-textarea {
  flex: 1;
  min-height: 200px;
  background: var(--editor-bg);
  border: none;
  padding: 14px 16px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.6;
  color: var(--light);
  resize: none;
  outline: none;
  tab-size: 4;
}
.editor-textarea::placeholder { color: var(--muted); }

.output-header {
  display: flex; align-items: center;
  padding: 8px 16px;
  border-top: 1px solid var(--mid-blue);
  border-bottom: 1px solid var(--mid-blue);
}
.output-header-label {
  font-size: 13px; font-weight: 600; color: var(--body-gray);
}

.output-area {
  min-height: 100px;
  max-height: 200px;
  overflow-y: auto;
  padding: 10px 16px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.5;
  color: var(--light);
  background: var(--editor-bg);
}
.output-line { margin-bottom: 2px; }
.output-line.error { color: var(--red); }
.output-line.success { color: var(--green); }
.output-line.info { color: var(--yellow); }

/* Lesson navigation footer */
.lesson-nav-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  border-top: 1px solid var(--mid-blue);
  background: var(--dark-blue);
}

/* ── QUESTS SCREEN ── */
#screen-quests {
  flex-direction: column;
  overflow-y: auto;
  padding: 32px 40px;
  gap: 16px;
}

.quest-card {
  display: flex; align-items: flex-start; gap: 16px;
  background: var(--card-bg);
  border: 1px solid var(--mid-blue);
  border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer;
  transition: all var(--transition);
  max-width: 700px;
}
.quest-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.quest-card.completed { border-color: var(--green-dk); }

.quest-icon {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: var(--mid-blue);
  border-radius: var(--radius);
  font-size: 18px;
  flex-shrink: 0;
}
.quest-card.completed .quest-icon { background: var(--green-dk); }

.quest-info { flex: 1; }
.quest-title { font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
.quest-desc { font-size: 13px; color: var(--body-gray); line-height: 1.5; }
.quest-tags { display: flex; gap: 6px; margin-top: 8px; }
.quest-tag {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; background: var(--mid-blue); color: var(--body-gray);
  text-transform: uppercase; letter-spacing: 0.5px;
}

/* ── SANDBOX SCREEN ── */
#screen-sandbox {
  flex-direction: row;
  overflow: hidden;
}

/* ── SETTINGS SCREEN ── */
#screen-settings {
  flex-direction: column;
  overflow-y: auto;
  padding: 32px 40px;
  gap: 20px;
  max-width: 600px;
}

.settings-group {
  background: var(--card-bg);
  border: 1px solid var(--mid-blue);
  border-radius: var(--radius);
  padding: 20px;
}
.settings-group-title {
  font-size: 14px; font-weight: 700; color: var(--accent);
  margin-bottom: 12px;
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0;
}
.settings-row label {
  font-size: 13px; color: var(--body-gray);
}

/* ═══════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════ */

/* ── Hint Drawer ── */
.hint-drawer-toggle {
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border-top: 1px solid var(--mid-blue);
  background: var(--dark-blue);
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}
.hint-drawer-toggle:hover { background: var(--panel-bg); }
.hint-drawer-toggle-label {
  font-size: 12px; font-weight: 600; color: var(--yellow);
}
.hint-drawer-toggle-arrow {
  font-size: 10px; color: var(--yellow);
  transition: transform 0.3s ease;
}
.hint-drawer-toggle.open .hint-drawer-toggle-arrow { transform: rotate(180deg); }

.hint-drawer-body {
  max-height: 0;
  overflow: hidden;
  background: var(--editor-bg);
  border-top: 1px solid var(--mid-blue);
  transition: max-height 0.35s ease;
}
.hint-drawer-body.open {
  max-height: 400px;
}
.hint-drawer-content {
  padding: 14px 16px;
}

.hint-stage {
  margin-bottom: 12px;
}
.hint-stage-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--mid-blue);
  background: transparent;
  color: var(--body-gray);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 6px;
}
.hint-stage-btn:hover { border-color: var(--yellow); color: var(--yellow); }
.hint-stage-btn.revealed { border-color: var(--muted); color: var(--muted); cursor: default; }
.hint-stage-btn.solution-btn { border-color: var(--orange); color: var(--orange); }
.hint-stage-btn.solution-btn:hover { background: var(--orange); color: var(--navy); }
.hint-stage-btn.solution-btn.revealed { border-color: var(--muted); color: var(--muted); background: transparent; cursor: default; }

.hint-stage-text {
  display: none;
  font-size: 13px; line-height: 1.6; color: var(--light);
  padding: 8px 12px;
  background: var(--code-bg);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--yellow);
  margin-top: 4px;
}
.hint-stage-text.visible { display: block; }
.hint-stage-text.solution-text { border-left-color: var(--orange); }
.hint-stage-text pre {
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 13px; line-height: 1.5;
  white-space: pre; color: var(--light);
}

.hint-copy-btn {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--green-dk);
  background: transparent;
  color: var(--green);
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.hint-copy-btn:hover { background: var(--green); color: var(--navy); }
.hidden { display: none !important; }
.text-accent { color: var(--accent); }
.text-green { color: var(--green); }
.text-yellow { color: var(--yellow); }
.text-red { color: var(--red); }
.text-muted { color: var(--body-gray); }
.font-mono { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; }

/* ═══════════════════════════════════════════
   Keyword highlighting in code blocks
   ═══════════════════════════════════════════ */
.kw { color: #FF79C6; }   /* keywords: local, function, if, then, etc */
.str { color: #F1FA8C; }  /* strings */
.num { color: #BD93F9; }  /* numbers */
.cm { color: #6272A4; }   /* comments */
.fn { color: #50FA7B; }   /* function names / built-ins */
.op { color: #FF79C6; }   /* operators like =, +, etc */
.bi { color: #8BE9FD; }   /* built-in globals/types */
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar"></nav>
  <div id="main">
    <div id="topbar"></div>
    <div id="page">
      <div id="screen-home" class="screen"></div>
      <div id="screen-unit" class="screen"></div>
      <div id="screen-lesson" class="screen"></div>
      <div id="screen-quests" class="screen"></div>

<script>
// Unit 1 — Values & Variables
const Unit1 = { id: 1, title: "Values & Variables", description: "Learn the building blocks of Luau: how to store data, work with different types, and use variables to make your code dynamic.", icon: "📦", lessons: [
  { id: 1, title: "Your First Script", description: "Write your very first line of Luau code.",
    content: [ { type:'heading', text:'Your First Script' }, { type:'paragraph', text:'Welcome to Luau! Every coding journey starts with a single line. In Luau, the simplest thing you can do is print a message to the Output window.' }, { type:'paragraph', text:'The <code>print()</code> function takes whatever you give it and displays it as output. Anything inside quotes is called a <strong>string</strong> — it\'s just text.' }, { type:'code', text:'print("Hello, world!")' }, { type:'paragraph', text:'When you run this code, you\'ll see <code>Hello, world!</code> appear in the Output panel on the right.' }, { type:'paragraph', text:'You can print numbers too — no quotes needed for numbers:' }, { type:'code', text:'print(42)\nprint(3.14)' }, { type:'paragraph', text:'You can even print multiple things at once by separating them with commas:' }, { type:'code', text:'print("The answer is", 42)' }, { type:'tip', label:'⭐ TRY IT', text:'In the editor on the right, write a print() statement that outputs your name. Then click Run to see the result!' } ],
    starterCode: '-- Write your first print statement below!\n',
    challenge: { instructions: 'Print the text "Hello, Luau!" (exactly as written, with the exclamation mark).', expectedOutput: ['Hello, Luau!'],
      hint1: 'You need to use the print() function with the exact text inside quotes.',
      hint2: 'The format is: print("your text here") — make sure the text between the quotes matches exactly, including capitalization and the exclamation mark.',
      solution: 'print("Hello, Luau!")' } },
  { id: 2, title: "Creating Variables", description: "Learn to store values in named containers.",
    content: [ { type:'heading', text:'Creating Variables' }, { type:'paragraph', text:'A <strong>variable</strong> is like a sticky note with a name on it — you write a value down, stick it somewhere, and refer back to it whenever you need it. In code, you create one with the <code>local</code> keyword:' }, { type:'code', text:'local playerName = "StarCoder42"' }, { type:'paragraph', text:'Let\'s break this down. The word <code>local</code> tells Luau you\'re making a new variable. Then comes the name you choose (<code>playerName</code>), the <code>=</code> sign which stores a value into it, and finally the value itself — the string <code>"StarCoder42"</code>.' }, { type:'paragraph', text:'The <code>local</code> keyword is important — it keeps your variable neatly scoped so it doesn\'t leak into places it shouldn\'t. Always use it when making new variables.' }, { type:'heading3', text:'Why Use Variables?' }, { type:'paragraph', text:'Say your game has a speed value of <strong>24.5</strong> that you reference in ten different places. If you hard-code it everywhere and then want to change it, you\'d have to hunt down all ten spots. With a variable, you change it in one place:' }, { type:'code', text:'local walkSpeed = 24.5\nprint(walkSpeed)  -- Output: 24.5' }, { type:'heading3', text:'Updating Variables' }, { type:'paragraph', text:'The word "variable" literally means "able to change." Once a variable exists, you can give it a new value at any time by using <code>=</code> again — but this time WITHOUT the <code>local</code> keyword, since you\'re updating, not creating:' }, { type:'code', text:'local lives = 3\nprint(lives)  -- Output: 3\n\nlives = 5\nprint(lives)  -- Output: 5' }, { type:'tip', label:'💡 RULE OF THUMB', text:'Writing local = creating something new. No local = changing something that already exists.' } ],
    starterCode: '-- Create a variable called "score" and set it to 100\n-- Then print it\n',
    challenge: { instructions: 'Create a variable called "score" with the value 100, then change it to 250, then print it. The output should be 250.', expectedOutput: ['250'],
      hint1: 'You need three steps: create the variable with local, change it without local, then print it.',
      hint2: 'First line: local score = 100. Second line: reassign score to 250 (no local keyword!). Third line: print(score).',
      solution: 'local score = 100\nscore = 250\nprint(score)' } },
  { id: 3, title: "Data Types", description: "Understand the four basic types: strings, numbers, booleans, and nil.",
    content: [ { type:'heading', text:'Data Types' }, { type:'paragraph', text:'Every value in Luau has a <strong>type</strong>. The type tells Luau (and you!) what kind of data you\'re working with. There are four basic types you\'ll use constantly:' }, { type:'code', text:'local name = "Alex"       -- string (text)\nlocal score = 100         -- number\nlocal isAlive = true      -- boolean (true or false)\nlocal nothing = nil       -- nil (empty/no value)' }, { type:'heading3', text:'Strings' }, { type:'paragraph', text:'Strings are text — anything wrapped in quotes:' }, { type:'code', text:'local greeting = "Hello!"\nlocal other = \'Also works!\'' }, { type:'heading3', text:'Numbers' }, { type:'paragraph', text:'Whole numbers, decimals, positive, negative — Luau handles them all:' }, { type:'code', text:'local whole = 42\nlocal decimal = 3.14\nlocal negative = -10' }, { type:'heading3', text:'Booleans' }, { type:'paragraph', text:'Only two possible values: <code>true</code> or <code>false</code>.' }, { type:'code', text:'local hasShield = true\nlocal isGameOver = false' }, { type:'heading3', text:'Checking Types' }, { type:'paragraph', text:'Use the <code>type()</code> function to check any value\'s type:' }, { type:'code', text:'print(type("hello"))  -- string\nprint(type(42))       -- number\nprint(type(true))     -- boolean\nprint(type(nil))      -- nil' }, { type:'tip', label:'⭐ KEY CONCEPT', text:'In Luau, 0 and "" are truthy! Only false and nil are falsy. Different from most other languages.' } ],
    starterCode: '-- Create one variable of each type and print its type\n',
    challenge: { instructions: 'Create a string, number, and boolean variable. Print type() of each. Output: string, number, boolean (three lines).', expectedOutput: ['string', 'number', 'boolean'],
      hint1: 'Create three variables (any names, any values) — one for each type. Then use print(type(variableName)) for each.',
      hint2: 'Example: local a = "hi" is a string. Then print(type(a)) prints "string". Do the same for a number and a boolean.',
      solution: 'local a = "hi"\nlocal b = 5\nlocal c = true\nprint(type(a))\nprint(type(b))\nprint(type(c))' } },
  { id: 4, title: "Working with Strings", description: "Combine, measure, and transform text.",
    content: [ { type:'heading', text:'Working with Strings' }, { type:'paragraph', text:'Strings are everywhere in games — player names, chat messages, UI labels. Let\'s learn the tools for working with them.' }, { type:'heading3', text:'Joining Strings (Concatenation)' }, { type:'paragraph', text:'Use the <code>..</code> operator (two dots) to join strings together:' }, { type:'code', text:'local first = "Hello"\nlocal second = "World"\nlocal combined = first .. " " .. second\nprint(combined)  -- Hello World' }, { type:'heading3', text:'String Interpolation' }, { type:'paragraph', text:'Luau has a much cleaner way — use backticks <code>`</code> and curly braces <code>{}</code> to embed values directly:' }, { type:'code', text:'local player = "Alex"\nlocal coins = 50\nprint(`{player} has {coins} coins!`)\n-- Output: Alex has 50 coins!' }, { type:'heading3', text:'String Length' }, { type:'code', text:'local name = "Alex"\nprint(#name)              -- 4\nprint(string.len(name))   -- 4' }, { type:'heading3', text:'Useful String Functions' }, { type:'code', text:'print(string.upper("hello"))    -- HELLO\nprint(string.lower("HELLO"))    -- hello\nprint(string.rep("ha", 3))      -- hahaha\nprint(string.reverse("hello"))  -- olleh' } ],
    starterCode: '-- Create two variables: your first name and last name\n-- Print your full name using string interpolation\n',
    challenge: { instructions: 'Create variables for first name "Lua" and last name "Master". Use string interpolation to print "Hello, Lua Master!" (exact text).', expectedOutput: ['Hello, Lua Master!'],
      hint1: 'Store "Lua" and "Master" in two variables, then use backtick string interpolation inside print().',
      hint2: 'The backtick syntax is: `Hello, {first} {last}!` — use backticks (`) not regular quotes, and wrap variable names in curly braces {}.',
      solution: 'local first = "Lua"\nlocal last = "Master"\nprint(`Hello, {first} {last}!`)' } },
  { id: 5, title: "Numbers & Math", description: "Arithmetic operators and the math library.",
    content: [ { type:'heading', text:'Numbers & Math' }, { type:'paragraph', text:'Numbers are the engine of every game — health, damage, speed, scores. Luau gives you all the math tools you need.' }, { type:'heading3', text:'Arithmetic Operators' }, { type:'code', text:'print(10 + 3)    -- 13  (addition)\nprint(10 - 3)    -- 7   (subtraction)\nprint(10 * 3)    -- 30  (multiplication)\nprint(10 / 3)    -- 3.3333  (division)\nprint(10 // 3)   -- 3   (floor division)\nprint(10 % 3)    -- 1   (remainder)\nprint(2 ^ 10)    -- 1024 (power)' }, { type:'heading3', text:'Compound Assignment' }, { type:'code', text:'local score = 100\nscore += 10    -- same as: score = score + 10\nprint(score)   -- 110' }, { type:'heading3', text:'Math Library Highlights' }, { type:'code', text:'print(math.floor(3.7))     -- 3  (round down)\nprint(math.ceil(3.2))      -- 4  (round up)\nprint(math.abs(-15))       -- 15 (absolute value)\nprint(math.max(5, 12, 3))  -- 12 (largest)\nprint(math.min(5, 12, 3))  -- 3  (smallest)' }, { type:'heading3', text:'Clamping Values' }, { type:'paragraph', text:'<code>math.clamp()</code> keeps a value within a range — incredibly useful in games:' }, { type:'code', text:'local health = 150\nhealth = math.clamp(health, 0, 100)\nprint(health)  -- 100 (clamped to max)' } ],
    starterCode: '-- Calculate the area of a rectangle\n-- width = 15, height = 8\n-- Print the result\n',
    challenge: { instructions: 'Create variables width = 15 and height = 8. Calculate the area (width * height) and print it. Output should be 120.', expectedOutput: ['120'],
      hint1: 'Area of a rectangle is width multiplied by height. Use the * operator.',
      hint2: 'Create two variables with local, then print(width * height). You can do the math directly inside print().',
      solution: 'local width = 15\nlocal height = 8\nprint(width * height)' } },
]};

// ═══════════════════════════════════════════
// UNIT 2 — Control Flow (5 lessons)
// ═══════════════════════════════════════════
const Unit2 = { id: 2, title: "Control Flow", description: "Teach your code to make decisions and repeat actions with if-statements and loops.", icon: "🔀", lessons: [
  { id: 1, title: "If / Then / Else", description: "Make your code choose between different paths.",
    content: [
      { type: 'heading', text: 'If / Then / Else' },
      { type: 'paragraph', text: 'An <code>if</code> statement checks a condition. If the condition is true, the code inside runs. If not, it skips ahead (or runs an <code>else</code> block instead).' },
      { type: 'code', text: 'local health = 25\n\nif health <= 0 then\n    print("Game Over!")\nelseif health <= 25 then\n    print("Warning: Low health!")\nelse\n    print("You\'re doing great!")\nend' },
      { type: 'paragraph', text: 'The code checks each condition from top to bottom and runs the FIRST block that matches. Once a match is found, all other blocks are skipped.' },
      { type: 'paragraph', text: 'The <code>elseif</code> and <code>else</code> parts are optional. You can have just an <code>if...then...end</code> for simple checks.' },
      { type: 'tip', label: '⭐ KEY CONCEPT', text: 'Every if block MUST end with the word "end". Forgetting "end" is one of the most common Luau errors!' },
    ],
    starterCode: '-- Create a variable "temperature" set to 75\n-- If temperature > 90, print "Hot!"\n-- Else print "Nice weather!"\n',
    challenge: { instructions: 'Create a variable temperature = 75. If it\'s greater than 90, print "Hot!". Otherwise, print "Nice weather!" — output should be "Nice weather!"', expectedOutput: ['Nice weather!'], hint1: 'You need an if/else block that checks if temperature is greater than 90.',
      hint2: 'Structure: if temperature > 90 then print("Hot!") else print("Nice weather!") end — don\'t forget the end keyword!',
      solution: 'local temperature = 75\nif temperature > 90 then\n    print("Hot!")\nelse\n    print("Nice weather!")\nend' }
  },
  { id: 2, title: "Comparison Operators", description: "Learn ==, ~=, >, <, >=, and <=.",
    content: [
      { type: 'heading', text: 'Comparison Operators' },
      { type: 'paragraph', text: 'Comparisons evaluate to <code>true</code> or <code>false</code>. They\'re the building blocks of if-statement conditions.' },
      { type: 'code', text: 'print(5 == 5)    -- true  (equal to)\nprint(5 ~= 3)   -- true  (not equal to)\nprint(10 > 5)   -- true  (greater than)\nprint(3 < 7)    -- true  (less than)\nprint(5 >= 5)   -- true  (greater or equal)\nprint(3 <= 2)   -- false (less or equal)' },
      { type: 'warning', label: '⚠️ COMMON MISTAKE', text: 'One = is assignment (setting a value). Two == is comparison (checking equality). This is the #1 beginner mistake in every programming language!' },
    ],
    starterCode: '-- Check if 10 is greater than 5 and print the result\n',
    challenge: { instructions: 'Print whether 42 equals 42 (should print "true").', expectedOutput: ['true'], hint1: 'Use the == operator to compare two values, and print the result.',
      hint2: 'print() can display the result of a comparison directly: print(42 == 42).',
      solution: 'print(42 == 42)' }
  },
  { id: 3, title: "Logical Operators", description: "Combine conditions with and, or, not.",
    content: [
      { type: 'heading', text: 'Logical Operators' },
      { type: 'paragraph', text: 'Luau uses the words <code>and</code>, <code>or</code>, and <code>not</code> to combine conditions:' },
      { type: 'code', text: 'local health = 50\nlocal hasShield = true\n\nif health > 0 and hasShield then\n    print("Protected and alive!")\nend\n\nif health <= 0 or not hasShield then\n    print("Vulnerable!")\nend' },
      { type: 'paragraph', text: '<code>and</code> requires BOTH conditions to be true. <code>or</code> requires at least ONE. <code>not</code> flips true to false and vice versa.' },
      { type: 'tip', label: '💡 DEFAULT VALUES', text: 'A common pattern: local name = inputName or "Unknown" — if inputName is nil, it falls back to "Unknown".' },
    ],
    starterCode: 'local level = 10\nlocal hasKey = true\n-- Print "Access granted!" if level >= 5 AND hasKey is true\n',
    challenge: { instructions: 'With level = 10 and hasKey = true, print "Access granted!" if both conditions are met.', expectedOutput: ['Access granted!'], hint1: 'Use the "and" keyword to combine two conditions in one if-statement.',
      hint2: 'if level >= 5 and hasKey then — both must be true for the block to run. Don\'t forget end!',
      solution: 'local level = 10\nlocal hasKey = true\nif level >= 5 and hasKey then\n    print("Access granted!")\nend' }
  },
  { id: 4, title: "For Loops", description: "Repeat actions a specific number of times.",
    content: [
      { type: 'heading', text: 'For Loops' },
      { type: 'paragraph', text: 'A <code>for</code> loop runs a block of code a specific number of times. It uses a counter variable that automatically increments:' },
      { type: 'code', text: 'for i = 1, 5 do\n    print(`Round {i}!`)\nend\n-- Prints: Round 1! through Round 5!' },
      { type: 'paragraph', text: 'You can specify a step value as the third number:' },
      { type: 'code', text: 'for i = 0, 10, 2 do\n    print(i)  -- 0, 2, 4, 6, 8, 10\nend\n\nfor i = 5, 1, -1 do\n    print(i)  -- 5, 4, 3, 2, 1 (countdown!)\nend' },
      { type: 'tip', label: '⭐ REMEMBER', text: 'The loop variable (i) is local to the loop. It doesn\'t exist outside the for...end block.' },
    ],
    starterCode: '-- Print the numbers 1 through 5\n',
    challenge: { instructions: 'Use a for loop to print numbers 1 through 5, one per line.', expectedOutput: ['1','2','3','4','5'], hint1: 'Use a for loop with a start value of 1 and end value of 5.',
      hint2: 'The syntax is: for i = 1, 5 do ... end. Inside the loop, print(i) to display each number.',
      solution: 'for i = 1, 5 do\n    print(i)\nend' }
  },
  { id: 5, title: "While & Repeat Loops", description: "Loop based on conditions.",
    content: [
      { type: 'heading', text: 'While & Repeat Loops' },
      { type: 'paragraph', text: 'A <code>while</code> loop checks its condition BEFORE each iteration. A <code>repeat</code> loop checks AFTER (so it always runs at least once).' },
      { type: 'code', text: 'local fuel = 3\nwhile fuel > 0 do\n    print(`Fuel: {fuel}`)\n    fuel -= 1\nend\nprint("Empty!")' },
      { type: 'code', text: 'local attempts = 0\nrepeat\n    attempts += 1\n    print(`Attempt {attempts}`)\nuntil attempts >= 3' },
      { type: 'warning', label: '⚠️ INFINITE LOOPS', text: 'If your condition never becomes false, the loop runs forever and freezes your game! Always make sure something inside the loop changes the condition.' },
    ],
    starterCode: '-- Count down from 3 to 1 using a while loop, then print "Go!"\n',
    challenge: { instructions: 'Use a while loop to count from 3 down to 1, printing each number, then print "Go!" after the loop.', expectedOutput: ['3','2','1','Go!'], hint1: 'Start a while loop that runs as long as the count is above 0. Decrease the count each time.',
      hint2: 'Create local count = 3, then while count > 0 do — print count, subtract 1 with count -= 1. After the loop, print("Go!").',
      solution: 'local count = 3\nwhile count > 0 do\n    print(count)\n    count -= 1\nend\nprint("Go!")' }
  },
]};

// ═══════════════════════════════════════════
// UNIT 3 — Functions (4 lessons)
// ═══════════════════════════════════════════
const Unit3 = { id: 3, title: "Functions", description: "Create reusable blocks of code that you can call by name — the key to organized, powerful programs.", icon: "⚡", lessons: [
  { id: 1, title: "Declaring Functions", description: "Create and call your first function.",
    content: [
      { type: 'heading', text: 'Declaring Functions' },
      { type: 'paragraph', text: 'A <strong>function</strong> is a reusable block of code with a name. Instead of writing the same code over and over, you write it once as a function and call it whenever you need it.' },
      { type: 'code', text: 'local function sayHello()\n    print("Hello, world!")\nend\n\nsayHello()  -- Prints: Hello, world!\nsayHello()  -- Prints it again!' },
      { type: 'paragraph', text: 'Think of a function like a recipe — you define the steps once, then follow the recipe any time you want to make that dish.' },
      { type: 'tip', label: '⭐ NAMING', text: 'Good function names describe what the function DOES: calculateDamage, isAlive, spawnEnemy. Bad names: doStuff, func1, x.' },
    ],
    starterCode: '-- Create a function called greet that prints "Welcome!"\n-- Then call it\n',
    challenge: { instructions: 'Create a function called greet that prints "Welcome!" and call it once.', expectedOutput: ['Welcome!'], hint1: 'Define the function with local function greet() ... end, then call it by writing greet().',
      hint2: 'Put print("Welcome!") between the function and end keywords. Then on a new line, call greet() to run it.',
      solution: 'local function greet()\n    print("Welcome!")\nend\ngreet()' }
  },
  { id: 2, title: "Parameters & Returns", description: "Pass data into functions and get results back.",
    content: [
      { type: 'heading', text: 'Parameters & Returns' },
      { type: 'paragraph', text: '<strong>Parameters</strong> let you pass data INTO a function. <strong>Return values</strong> let the function send data BACK to you.' },
      { type: 'code', text: 'local function add(a, b)\n    return a + b\nend\n\nlocal result = add(10, 5)\nprint(result)  -- 15' },
      { type: 'paragraph', text: 'Parameters are like blank spaces the caller fills in. The function works the same way regardless of what values you pass:' },
      { type: 'code', text: 'local function greet(name)\n    print(`Hello, {name}!`)\nend\n\ngreet("Alex")    -- Hello, Alex!\ngreet("Jordan")  -- Hello, Jordan!' },
      { type: 'tip', label: '💡 MULTIPLE RETURNS', text: 'Luau functions can return multiple values! local quotient, remainder = divmod(17, 5)' },
    ],
    starterCode: '-- Create a function called double that takes a number\n-- and returns it multiplied by 2\n',
    challenge: { instructions: 'Create a function "double" that takes a number and returns it * 2. Call it with 21 and print the result (should be 42).', expectedOutput: ['42'], hint1: 'The function takes one parameter and should return that parameter multiplied by 2.',
      hint2: 'Inside the function, use return n * 2. Then call it with print(double(21)) to display the result.',
      solution: 'local function double(n)\n    return n * 2\nend\nprint(double(21))' }
  },
  { id: 3, title: "Scope & Closures", description: "Understand how functions capture variables from their environment.",
    content: [
      { type: 'heading', text: 'Scope & Closures' },
      { type: 'paragraph', text: 'Functions can "see" variables from the scope they were created in. When a function captures a variable from an outer scope, it\'s called a <strong>closure</strong>.' },
      { type: 'code', text: 'local count = 0\n\nlocal function increment()\n    count += 1\n    print(`Count: {count}`)\nend\n\nincrement()  -- Count: 1\nincrement()  -- Count: 2\nincrement()  -- Count: 3' },
      { type: 'paragraph', text: 'The function "remembers" the variable <code>count</code> even though count was defined outside the function. This is incredibly powerful for creating stateful behavior.' },
      { type: 'tip', label: '⭐ WHY IT MATTERS', text: 'In Roblox, every time you write part.Touched:Connect(function(hit) ... end), you\'re creating a closure. The function captures variables from the surrounding scope.' },
    ],
    starterCode: 'local total = 0\n-- Create a function addToTotal(n) that adds n to total and prints total\n',
    challenge: { instructions: 'Create a closure: local total = 0, then a function addToTotal(n) that adds n to total and prints total. Call it with 10, then 20. Output should be 10 then 30.', expectedOutput: ['10', '30'], hint1: 'The function needs to modify the outer variable total using += and then print it.',
      hint2: 'Inside addToTotal, write total += n then print(total). The function "sees" total from the outer scope — that\'s a closure!',
      solution: 'local total = 0\nlocal function addToTotal(n)\n    total += n\n    print(total)\nend\naddToTotal(10)\naddToTotal(20)' }
  },
  { id: 4, title: "Functions as Values", description: "Store functions in variables, pass them around, build powerful patterns.",
    content: [
      { type: 'heading', text: 'Functions as Values' },
      { type: 'paragraph', text: 'In Luau, functions are <strong>first-class values</strong>. This means you can store them in variables, put them in tables, and pass them as arguments to other functions.' },
      { type: 'code', text: 'local function applyTwice(fn, value)\n    return fn(fn(value))\nend\n\nlocal function addOne(x)\n    return x + 1\nend\n\nprint(applyTwice(addOne, 5))  -- 7 (5+1=6, 6+1=7)' },
      { type: 'paragraph', text: 'Anonymous functions (without a name) are common as callbacks:' },
      { type: 'code', text: 'local numbers = {3, 1, 4, 1, 5}\ntable.sort(numbers, function(a, b)\n    return a > b  -- Sort descending\nend)' },
      { type: 'tip', label: '🎮 ROBLOX USE', text: 'Event connections use this pattern constantly: button.Activated:Connect(function() ... end)' },
    ],
    starterCode: '-- Create a function called triple that multiplies by 3\n-- Pass it to print() to show triple(10)\n',
    challenge: { instructions: 'Create function triple(n) returning n * 3. Print triple(10). Output: 30.', expectedOutput: ['30'], hint1: 'Create a function that takes a number and returns it times 3.',
      hint2: 'local function triple(n) return n * 3 end — then print(triple(10)) to display 30.',
      solution: 'local function triple(n)\n    return n * 3\nend\nprint(triple(10))' }
  },
]};

// ═══════════════════════════════════════════
// UNIT 4 — Tables (5 lessons)
// ═══════════════════════════════════════════
const Unit4 = { id: 4, title: "Tables", description: "Master Luau's single most powerful data structure — arrays, dictionaries, and everything in between.", icon: "📋", lessons: [
  { id: 1, title: "Arrays", description: "Ordered lists of values.",
    content: [
      { type: 'heading', text: 'Arrays' },
      { type: 'paragraph', text: 'An <strong>array</strong> is an ordered list of values. In Luau, arrays are just tables with sequential integer keys starting at 1.' },
      { type: 'code', text: 'local fruits = {"Apple", "Banana", "Cherry"}\n\nprint(fruits[1])  -- Apple\nprint(fruits[2])  -- Banana\nprint(#fruits)    -- 3 (length)' },
      { type: 'warning', label: '⚠️ INDEX STARTS AT 1', text: 'Luau arrays start at index 1, NOT 0. This is different from most other languages!' },
      { type: 'code', text: 'table.insert(fruits, "Dragonfruit")  -- Add to end\nprint(#fruits)  -- 4\n\ntable.remove(fruits, 1)  -- Remove first item\nprint(fruits[1])  -- Banana (everything shifted)' },
    ],
    starterCode: '-- Create an array of 3 colors and print the second one\n',
    challenge: { instructions: 'Create an array colors = {"Red", "Green", "Blue"}. Print the length of the array (should be 3).', expectedOutput: ['3'], hint1: 'Create the array with curly braces, then use the # operator to get its length.',
      hint2: 'The # operator gives the length of an array: print(#colors). Make sure the array has exactly 3 items.',
      solution: 'local colors = {"Red", "Green", "Blue"}\nprint(#colors)' }
  },
  { id: 2, title: "Dictionaries", description: "Key-value pairs for structured data.",
    content: [
      { type: 'heading', text: 'Dictionaries' },
      { type: 'paragraph', text: 'A <strong>dictionary</strong> maps named keys to values. Perfect for structured data like player stats:' },

// ═══════════════════════════════════════════
// PROGRESS SYSTEM — localStorage + JSON export/import
// ═══════════════════════════════════════════

const Progress = (() => {
  const STORAGE_KEY = 'luau-lab-progress';

  const defaultState = () => ({
    version: 1,
    completedLessons: [],   // ["1-1", "1-2", "2-3", ...]
    completedQuests: [],    // ["q1", "q2", ...]
    lastVisited: null,      // "1-3" (unit-lesson)
    editorCode: {},         // { "1-1": "local x = 5\n..." }
    startedAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  });

  let state = defaultState();

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state = { ...defaultState(), ...parsed };
      }
    } catch (e) {
      console.warn('Progress: failed to load from localStorage', e);
    }
    return state;
  }

  function save() {
    state.updatedAt = new Date().toISOString();
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.warn('Progress: failed to save to localStorage', e);
    }
  }

  function completeLesson(unitId, lessonId) {
    const key = `${unitId}-${lessonId}`;
    if (!state.completedLessons.includes(key)) {
      state.completedLessons.push(key);
      save();
    }
  }

  function uncompleteLesson(unitId, lessonId) {
    const key = `${unitId}-${lessonId}`;
    state.completedLessons = state.completedLessons.filter(k => k !== key);
    save();
  }

  function isLessonComplete(unitId, lessonId) {
    return state.completedLessons.includes(`${unitId}-${lessonId}`);
  }

  function getUnitProgress(unitId, totalLessons) {
    const completed = state.completedLessons.filter(k => k.startsWith(`${unitId}-`)).length;
    return { completed, total: totalLessons, percent: totalLessons > 0 ? Math.round((completed / totalLessons) * 100) : 0 };
  }

  function completeQuest(questId) {
    if (!state.completedQuests.includes(questId)) {
      state.completedQuests.push(questId);
      save();
    }
  }

  function isQuestComplete(questId) {
    return state.completedQuests.includes(questId);
  }

  function setLastVisited(key) {
    state.lastVisited = key;
    save();
  }

  function saveEditorCode(lessonKey, code) {
    state.editorCode[lessonKey] = code;
    save();
  }

  function getEditorCode(lessonKey) {
    return state.editorCode[lessonKey] || null;
  }

  function getTotalStats() {
    return {
      lessonsCompleted: state.completedLessons.length,
      questsCompleted: state.completedQuests.length,
      startedAt: state.startedAt,
      updatedAt: state.updatedAt,
    };
  }

  // ── JSON Export/Import ──
  function exportJSON() {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `luau-lab-progress-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importJSON(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (imported.version && imported.completedLessons) {
            state = { ...defaultState(), ...imported };
            save();
            resolve(state);
          } else {
            reject(new Error('Invalid progress file format'));
          }
        } catch (err) {
          reject(err);
        }
      };
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsText(file);
    });
  }

  function reset() {
    state = defaultState();
    save();
    return state;
  }

  // Initialize on load
  load();

  return {
    completeLesson, uncompleteLesson, isLessonComplete, getUnitProgress,
    completeQuest, isQuestComplete,
    setLastVisited, saveEditorCode, getEditorCode,
    getTotalStats, exportJSON, importJSON, reset, load,
    get state() { return state; },
  };
})();

// ═══════════════════════════════════════════
// EDITOR — Simulated Luau execution engine
// ═══════════════════════════════════════════

const Editor = (() => {

  // ── Lightweight Luau simulator ──
  // Handles: print(), variable assignment, basic math, string concat/interp,
  // if/else, for loops, while loops, table construction, simple function calls

  function simulate(code) {
    const output = [];
    const env = {};

    try {
      const lines = preprocess(code);
      executeBlock(lines, env, output, 0);
    } catch (e) {
      output.push({ type: 'error', text: e.message || String(e) });
    }

    return output;
  }

  function preprocess(code) {
    return code
      .split('\n')
      .map(line => line.replace(/--.*$/, '').trimEnd()) // strip comments
      .filter(line => line.trim() !== '');
  }

  function resolveValue(expr, env) {
    expr = expr.trim();

    // nil
    if (expr === 'nil') return null;
    // booleans
    if (expr === 'true') return true;
    if (expr === 'false') return false;
    // numbers
    if (/^-?\d+(\.\d+)?$/.test(expr)) return parseFloat(expr);
    if (/^0x[0-9a-fA-F]+$/.test(expr)) return parseInt(expr, 16);
    if (/^0b[01]+$/.test(expr)) return parseInt(expr.slice(2), 2);
    // strings (double/single quote)
    const strMatch = expr.match(/^["'](.*)["']$/);
    if (strMatch) return strMatch[1];
    // backtick interpolation
    if (expr.startsWith('`') && expr.endsWith('`')) {
      const inner = expr.slice(1, -1);
      return inner.replace(/\{([^}]+)\}/g, (_, e) => {
        const val = resolveValue(e.trim(), env);
        return val === null ? 'nil' : String(val);
      });
    }
    // table constructor
    if (expr.startsWith('{') && expr.endsWith('}')) {
      return parseTable(expr, env);
    }
    // # (length)
    if (expr.startsWith('#')) {
      const val = resolveValue(expr.slice(1), env);
      if (typeof val === 'string') return val.length;
      if (Array.isArray(val)) return val.filter((_, i) => i > 0).length; // skip index 0
      if (typeof val === 'object' && val !== null) {
        // count sequential integer keys
        let count = 0;
        while (val[count + 1] !== undefined) count++;
        return count;
      }
      return 0;
    }
    // not operator
    if (expr.startsWith('not ')) {
      const val = resolveValue(expr.slice(4), env);
      return val === false || val === null;
    }
    // math functions
    const mathMatch = expr.match(/^math\.(\w+)\((.+)\)$/);
    if (mathMatch) {
      const fn = mathMatch[1];
      const args = splitArgs(mathMatch[2]).map(a => resolveValue(a, env));
      return evalMath(fn, args);
    }
    // string functions
    const strFnMatch = expr.match(/^string\.(\w+)\((.+)\)$/);
    if (strFnMatch) {
      const fn = strFnMatch[1];
      const args = splitArgs(strFnMatch[2]).map(a => resolveValue(a, env));
      return evalString(fn, args);
    }
    // tostring/tonumber/type
    const builtinMatch = expr.match(/^(tostring|tonumber|type)\((.+)\)$/);
    if (builtinMatch) {
      const val = resolveValue(builtinMatch[2], env);
      if (builtinMatch[1] === 'tostring') return String(val === null ? 'nil' : val);
      if (builtinMatch[1] === 'tonumber') return Number(val) || null;
      if (builtinMatch[1] === 'type') {
        if (val === null) return 'nil';
        if (typeof val === 'boolean') return 'boolean';
        if (typeof val === 'number') return 'number';
        if (typeof val === 'string') return 'string';
        if (typeof val === 'object') return 'table';
        if (typeof val === 'function') return 'function';
        return typeof val;
      }
    }
    // table.insert
    if (expr.startsWith('table.insert(')) {
      // This is a statement, not an expression, but handle gracefully
      return null;
    }
    // Concatenation (..)
    if (expr.includes(' .. ')) {
      const parts = expr.split(' .. ').map(p => resolveValue(p.trim(), env));
      return parts.map(p => p === null ? 'nil' : String(p)).join('');
    }
    // Arithmetic
    for (const [op, fn] of [[' + ', (a,b) => a+b], [' - ', (a,b) => a-b], [' * ', (a,b) => a*b], [' / ', (a,b) => a/b], [' // ', (a,b) => Math.floor(a/b)], [' % ', (a,b) => a%b], [' ^ ', (a,b) => Math.pow(a,b)]]) {
      const idx = expr.lastIndexOf(op);
      if (idx > 0) {
        const left = resolveValue(expr.slice(0, idx), env);
        const right = resolveValue(expr.slice(idx + op.length), env);
        if (typeof left === 'number' && typeof right === 'number') return fn(left, right);
      }
    }
    // Comparison
    for (const [op, fn] of [
      [' == ', (a,b) => a === b], [' ~= ', (a,b) => a !== b],
      [' >= ', (a,b) => a >= b], [' <= ', (a,b) => a <= b],
      [' > ', (a,b) => a > b], [' < ', (a,b) => a < b],
    ]) {
      const idx = expr.indexOf(op);
      if (idx > 0) {
        const left = resolveValue(expr.slice(0, idx), env);
        const right = resolveValue(expr.slice(idx + op.length), env);
        return fn(left, right);
      }
    }
    // and / or
    if (expr.includes(' and ')) {
      const idx = expr.indexOf(' and ');
      const left = resolveValue(expr.slice(0, idx), env);
      if (left === false || left === null) return left;
      return resolveValue(expr.slice(idx + 5), env);
    }
    if (expr.includes(' or ')) {
      const idx = expr.indexOf(' or ');
      const left = resolveValue(expr.slice(0, idx), env);
      if (left !== false && left !== null) return left;
      return resolveValue(expr.slice(idx + 4), env);
    }
    // Table indexing: tbl.key or tbl[key]
    const dotMatch = expr.match(/^(\w+)\.(\w+)$/);
    if (dotMatch) {
      const tbl = env[dotMatch[1]];
      if (tbl && typeof tbl === 'object') return tbl[dotMatch[2]] !== undefined ? tbl[dotMatch[2]] : null;
    }
    const bracketMatch = expr.match(/^(\w+)\[(.+)\]$/);
    if (bracketMatch) {
      const tbl = env[bracketMatch[1]];
      const key = resolveValue(bracketMatch[2], env);
      if (tbl && typeof tbl === 'object') return tbl[key] !== undefined ? tbl[key] : null;
    }
    // Variable lookup
    if (/^\w+$/.test(expr)) {
      return env[expr] !== undefined ? env[expr] : null;
    }
    // Parenthesized expression
    if (expr.startsWith('(') && expr.endsWith(')')) {
      return resolveValue(expr.slice(1, -1), env);
    }

    return null;
  }

  function parseTable(expr, env) {
    const inner = expr.slice(1, -1).trim();
    if (!inner) return {};
    const result = {};
    let arrayIdx = 1;
    const items = splitArgs(inner);
    for (const item of items) {
      const kvMatch = item.trim().match(/^(\w+)\s*=\s*(.+)$/);
      if (kvMatch) {
        result[kvMatch[1]] = resolveValue(kvMatch[2], env);
      } else {
        result[arrayIdx++] = resolveValue(item.trim(), env);
      }
    }
    return result;
  }

  function splitArgs(str) {
    const args = [];
    let depth = 0, start = 0, inStr = false, strChar = '';
    for (let i = 0; i < str.length; i++) {
      const ch = str[i];
      if (inStr) {
        if (ch === strChar && str[i-1] !== '\\') inStr = false;
      } else if (ch === '"' || ch === "'" || ch === '`') {
        inStr = true; strChar = ch;
      } else if (ch === '(' || ch === '{' || ch === '[') {
        depth++;
      } else if (ch === ')' || ch === '}' || ch === ']') {
        depth--;
      } else if (ch === ',' && depth === 0) {
        args.push(str.slice(start, i));
        start = i + 1;
      }
    }
    if (start < str.length) args.push(str.slice(start));
    return args;
  }

  function evalMath(fn, args) {
    const m = Math;
    const map = {
      abs: (a) => m.abs(a), ceil: (a) => m.ceil(a), floor: (a) => m.floor(a),
      round: (a) => m.round(a), sqrt: (a) => m.sqrt(a),
      max: (...a) => m.max(...a), min: (...a) => m.min(...a),
      random: (a, b) => a && b ? m.floor(m.random() * (b - a + 1)) + a : m.random(),
      sin: (a) => m.sin(a), cos: (a) => m.cos(a), tan: (a) => m.tan(a),
      rad: (a) => a * m.PI / 180, deg: (a) => a * 180 / m.PI,
      log: (a, b) => b ? m.log(a) / m.log(b) : m.log(a),
      pow: (a, b) => m.pow(a, b),
      clamp: (x, lo, hi) => m.max(lo, m.min(hi, x)),
      huge: () => Infinity, pi: () => m.PI,
    };
    if (fn === 'huge') return Infinity;
    if (fn === 'pi') return m.PI;
    const f = map[fn];
    return f ? f(...args) : null;
  }

  function evalString(fn, args) {
    const map = {
      len: (s) => s.length,
      upper: (s) => s.toUpperCase(),
      lower: (s) => s.toLowerCase(),
      rep: (s, n) => s.repeat(n),
      reverse: (s) => s.split('').reverse().join(''),
      sub: (s, i, j) => s.slice(i - 1, j),
      byte: (s, i) => s.charCodeAt((i || 1) - 1),
      char: (...codes) => String.fromCharCode(...codes),
      format: (fmt, ...a) => fmt, // simplified
      find: (s, p) => { const i = s.indexOf(p); return i >= 0 ? i + 1 : null; },
      split: (s, sep) => { const parts = s.split(sep); const r = {}; parts.forEach((p, i) => r[i+1] = p); return r; },
    };
    const f = map[fn];
    return f ? f(...args) : null;
  }

  function executeBlock(lines, env, output, startIdx) {
    let i = startIdx;
    let iterations = 0;
    const MAX_ITER = 5000;

    while (i < lines.length) {
      if (++iterations > MAX_ITER) {
        output.push({ type: 'error', text: 'Execution limit reached (possible infinite loop)' });
        return i;
      }

      const line = lines[i].trim();

      // End of block
      if (line === 'end' || line === 'else' || line.startsWith('elseif ')) return i;

      // print()
      const printMatch = line.match(/^print\((.+)\)$/);
      if (printMatch) {
        const args = splitArgs(printMatch[1]).map(a => resolveValue(a, env));
        const text = args.map(a => a === null ? 'nil' : a === true ? 'true' : a === false ? 'false' : typeof a === 'object' ? 'table' : String(a)).join('\t');
        output.push({ type: 'normal', text });
        i++; continue;
      }

      // warn()
      const warnMatch = line.match(/^warn\((.+)\)$/);
      if (warnMatch) {
        const args = splitArgs(warnMatch[1]).map(a => resolveValue(a, env));
        const text = args.map(a => a === null ? 'nil' : String(a)).join('\t');
        output.push({ type: 'info', text });
        i++; continue;
      }

      // local variable declaration
      const localMatch = line.match(/^local\s+(\w+)\s*=\s*(.+)$/);
      if (localMatch) {
        env[localMatch[1]] = resolveValue(localMatch[2], env);
        i++; continue;
      }

      // local without assignment
      const localNilMatch = line.match(/^local\s+(\w+)\s*$/);
      if (localNilMatch) {
        env[localNilMatch[1]] = null;
        i++; continue;
      }

      // Multi local: local a, b, c = 1, 2, 3
      const multiLocal = line.match(/^local\s+([\w,\s]+)\s*=\s*(.+)$/);
      if (multiLocal) {
        const names = multiLocal[1].split(',').map(n => n.trim());
        const values = splitArgs(multiLocal[2]).map(v => resolveValue(v, env));
        names.forEach((name, idx) => { env[name] = values[idx] !== undefined ? values[idx] : null; });
        i++; continue;
      }

      // Variable assignment (no local)
      const assignMatch = line.match(/^(\w+)\s*=\s*(.+)$/);
      if (assignMatch && !line.startsWith('local ') && !line.startsWith('function ') && !line.startsWith('if ') && !line.startsWith('for ') && !line.startsWith('while ')) {
        env[assignMatch[1]] = resolveValue(assignMatch[2], env);
        i++; continue;
      }

      // Compound assignment
      const compoundMatch = line.match(/^(\w+)\s*(\+=|-=|\*=|\/=|\.\.=)\s*(.+)$/);
      if (compoundMatch) {
        const name = compoundMatch[1];
        const op = compoundMatch[2];
        const right = resolveValue(compoundMatch[3], env);
        const left = env[name] || 0;
        switch (op) {
          case '+=': env[name] = left + right; break;
          case '-=': env[name] = left - right; break;
          case '*=': env[name] = left * right; break;
          case '/=': env[name] = left / right; break;
          case '..=': env[name] = String(left) + String(right); break;
        }
        i++; continue;
      }

      // table.insert
      const insertMatch = line.match(/^table\.insert\((\w+),\s*(.+)\)$/);
      if (insertMatch) {
        const tbl = env[insertMatch[1]];
        const val = resolveValue(insertMatch[2], env);
        if (tbl && typeof tbl === 'object') {
          let maxIdx = 0;
          for (const k in tbl) { const n = parseInt(k); if (!isNaN(n) && n > maxIdx) maxIdx = n; }
          tbl[maxIdx + 1] = val;
        }
        i++; continue;
      }

      // table.remove
      const removeMatch = line.match(/^table\.remove\((\w+),?\s*(.*)\)$/);
      if (removeMatch) {
        const tbl = env[removeMatch[1]];
        if (tbl && typeof tbl === 'object') {
          const idx = removeMatch[2] ? resolveValue(removeMatch[2], env) : null;
          // simplified: just acknowledge
        }
        i++; continue;
      }

      // Dot assignment: tbl.key = value
      const dotAssign = line.match(/^(\w+)\.(\w+)\s*=\s*(.+)$/);
      if (dotAssign) {
        if (!env[dotAssign[1]] || typeof env[dotAssign[1]] !== 'object') env[dotAssign[1]] = {};
        env[dotAssign[1]][dotAssign[2]] = resolveValue(dotAssign[3], env);
        i++; continue;
      }

      // Bracket assignment: tbl[key] = value
      const bracketAssign = line.match(/^(\w+)\[(.+)\]\s*=\s*(.+)$/);
      if (bracketAssign) {
        if (!env[bracketAssign[1]] || typeof env[bracketAssign[1]] !== 'object') env[bracketAssign[1]] = {};
        const key = resolveValue(bracketAssign[2], env);
        env[bracketAssign[1]][key] = resolveValue(bracketAssign[3], env);
        i++; continue;
      }

      // for i = start, stop [, step] do
      const forMatch = line.match(/^for\s+(\w+)\s*=\s*(.+),\s*(.+?)(?:,\s*(.+))?\s+do$/);
      if (forMatch) {
        const varName = forMatch[1];
        const start = resolveValue(forMatch[2], env);
        const stop = resolveValue(forMatch[3], env);
        const step = forMatch[4] ? resolveValue(forMatch[4], env) : 1;
        const bodyStart = i + 1;
        // Find matching 'end'
        let endIdx = findEnd(lines, bodyStart);
        for (let v = start; step > 0 ? v <= stop : v >= stop; v += step) {
          if (++iterations > MAX_ITER) { output.push({ type: 'error', text: 'Loop iteration limit reached' }); return endIdx + 1; }
          env[varName] = v;
          executeBlock(lines, env, output, bodyStart);
        }
        i = endIdx + 1; continue;
      }

      // for k, v in tbl do (simplified)
      const forInMatch = line.match(/^for\s+(\w+),?\s*(\w*)\s+in\s+(?:ipairs|pairs)?\(?\s*(\w+)\s*\)?\s+do$/);
      if (forInMatch) {
        const k1 = forInMatch[1];
        const k2 = forInMatch[2];
        const tbl = env[forInMatch[3]];
        const bodyStart = i + 1;
        let endIdx = findEnd(lines, bodyStart);
        if (tbl && typeof tbl === 'object') {
          for (const key in tbl) {
            if (++iterations > MAX_ITER) { output.push({ type: 'error', text: 'Loop iteration limit reached' }); return endIdx + 1; }
            env[k1] = isNaN(key) ? key : parseInt(key);
            if (k2) env[k2] = tbl[key];
            executeBlock(lines, env, output, bodyStart);
          }
        }
        i = endIdx + 1; continue;
      }

      // while ... do
      const whileMatch = line.match(/^while\s+(.+)\s+do$/);
      if (whileMatch) {
        const bodyStart = i + 1;
        let endIdx = findEnd(lines, bodyStart);
        while (resolveValue(whileMatch[1], env)) {
          if (++iterations > MAX_ITER) { output.push({ type: 'error', text: 'While loop limit reached' }); return endIdx + 1; }
          executeBlock(lines, env, output, bodyStart);
        }
        i = endIdx + 1; continue;
      }

      // if ... then
      const ifMatch = line.match(/^if\s+(.+)\s+then$/);
      if (ifMatch) {
        const condition = resolveValue(ifMatch[1], env);
        const bodyStart = i + 1;
        if (condition && condition !== false) {
          const endOrElse = executeBlock(lines, env, output, bodyStart);
          i = skipToEnd(lines, endOrElse);
          i++; continue;
        } else {
          // Skip to else/elseif/end
          i = skipToElse(lines, bodyStart);
          const eline = lines[i] ? lines[i].trim() : 'end';
          if (eline === 'else') {
            const afterElse = executeBlock(lines, env, output, i + 1);
            i = afterElse + 1; continue;
          } else if (eline.startsWith('elseif ')) {
            continue; // Re-evaluate the elseif
          } else {
            i++; continue; // end
          }
        }
      }

      // Skip function definitions for now
      if (line.startsWith('local function ') || line.startsWith('function ')) {
        const endIdx = findEnd(lines, i + 1);
        i = endIdx + 1; continue;
      }

      // Unknown line — skip
      i++;
    }
    return i;
  }

  function findEnd(lines, startIdx) {
    let depth = 1;
    for (let i = startIdx; i < lines.length; i++) {
      const line = lines[i].trim();
      if (line.match(/^(if|for|while|repeat|function|local function)\b/) && (line.includes(' do') || line.includes(' then') || line === 'repeat')) depth++;
      if (line === 'end') { depth--; if (depth === 0) return i; }
    }
    return lines.length;
  }

  function skipToEnd(lines, fromIdx) {
    let depth = 0;
    for (let i = fromIdx; i < lines.length; i++) {
      const line = lines[i].trim();
      if (line.match(/^(if|for|while|repeat|function|local function)\b/) && (line.includes(' do') || line.includes(' then'))) depth++;
      if (line === 'end') {
        if (depth === 0) return i;
        depth--;
      }
      if (depth === 0 && (line === 'else' || line.startsWith('elseif '))) {
        // Skip past this else/elseif block to end
        continue;
      }
    }
    return lines.length;
  }

  function skipToElse(lines, fromIdx) {
    let depth = 0;
    for (let i = fromIdx; i < lines.length; i++) {
      const line = lines[i].trim();
      if (line.match(/^(if|for|while|repeat|function|local function)\b/) && (line.includes(' do') || line.includes(' then'))) depth++;
      if (line === 'end') {
        if (depth === 0) return i;
        depth--;
      }
      if (depth === 0 && (line === 'else' || line.startsWith('elseif '))) return i;
    }
    return lines.length;
  }

  // ── Check user output against expected ──
  function checkOutput(userOutput, expectedLines) {
    if (!expectedLines || expectedLines.length === 0) return { pass: true, message: 'No output check required.' };

    const userLines = userOutput
      .filter(o => o.type === 'normal')
      .map(o => o.text.trim());

    if (userLines.length === 0 && expectedLines.length > 0) {
      return { pass: false, message: 'No output detected. Make sure your code uses print().' };
    }

    for (let i = 0; i < expectedLines.length; i++) {
      const expected = String(expectedLines[i]).trim();
      const actual = userLines[i] ? userLines[i].trim() : undefined;
      if (actual === undefined) {
        return { pass: false, message: `Expected more output. Missing: "${expected}"` };
      }
      // Flexible matching: trim and compare
      if (actual !== expected) {
        // Try numeric comparison
        if (!isNaN(expected) && !isNaN(actual) && parseFloat(actual) === parseFloat(expected)) continue;
        return { pass: false, message: `Line ${i + 1}: Expected "${expected}" but got "${actual}"` };
      }
    }

    return { pass: true, message: 'All checks passed!' };
  }

  return { simulate, checkOutput };
})();
