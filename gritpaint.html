<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gritpaint</title>
<style>
  :root {
    --bg: #f4f4f6;
    --panel: #ffffff;
    --panel-border: #e0e0e4;
    --text: #1a1a2e;
    --text-dim: #8888a0;
    --accent: #3d5afe;
    --accent-hover: #536dfe;
    --danger: #ef5350;
    --success: #66bb6a;
    --tool-bg: #eeeef2;
    --tool-active: #3d5afe;
    --tool-active-text: #fff;
    --canvas-bg: #cccccc;
    --grid-line: rgba(0,0,0,0.08);
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
    --radius: 6px;
    --font: 'Segoe UI', -apple-system, sans-serif;
    --mono: 'SF Mono', 'Consolas', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
    height: 42px;
  }
  #header .logo {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
    color: var(--accent);
  }
  #header .logo span { color: var(--text); }
  .header-btns { display: flex; gap: 6px; }
  .header-btns button {
    padding: 4px 12px;
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    background: var(--panel);
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
  }
  .header-btns button:hover { border-color: var(--accent); color: var(--accent); }
  .header-btns button.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .header-btns button.primary:hover { background: var(--accent-hover); }

  /* ── Main Layout ── */
  #main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Left Panel (Tools + Color) ── */
  #left-panel {
    width: 200px;
    background: var(--panel);
    border-right: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .panel-section {
    padding: 10px;
    border-bottom: 1px solid var(--panel-border);
  }
  .panel-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* Tools grid */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
  }
  .tool-btn {
    aspect-ratio: 1;
    border: 1px solid transparent;
    border-radius: var(--radius);
    background: var(--tool-bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.12s;
    position: relative;
  }
  .tool-btn:hover { border-color: var(--accent); }
  .tool-btn.active {
    background: var(--tool-active);
    color: var(--tool-active-text);
    border-color: var(--tool-active);
  }
  .tool-btn .shortcut {
    position: absolute;
    bottom: 1px;
    right: 3px;
    font-size: 7px;
    color: var(--text-dim);
    font-family: var(--mono);
  }
  .tool-btn.active .shortcut { color: rgba(255,255,255,0.6); }

  /* Color picker area */
  .color-swatches {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .color-preview {
    position: relative;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }
  .color-fg, .color-bg-swatch {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px var(--panel-border);
    cursor: pointer;
    position: absolute;
  }
  .color-fg { top: 0; left: 0; z-index: 2; }
  .color-bg-swatch { bottom: 0; right: 0; z-index: 1; }
  .color-swap {
    position: absolute;
    top: -2px;
    right: -2px;
    font-size: 10px;
    cursor: pointer;
    z-index: 3;
    background: var(--panel);
    border-radius: 50%;
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--panel-border);
  }
  #color-input {
    width: 100%;
    padding: 4px 6px;
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 6px;
  }
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
  }
  .palette-color {
    aspect-ratio: 1;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid rgba(0,0,0,0.1);
    transition: transform 0.1s;
  }
  .palette-color:hover { transform: scale(1.2); z-index: 1; }

  /* Brush size */
  .brush-size-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .brush-size-row input[type="range"] { flex: 1; }
  .brush-size-row .size-val {
    font-family: var(--mono);
    font-size: 11px;
    min-width: 20px;
    text-align: right;
  }

  /* ── Canvas Area ── */
  #canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--canvas-bg);
    background-image:
      linear-gradient(45deg, #bbb 25%, transparent 25%),
      linear-gradient(-45deg, #bbb 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #bbb 75%),
      linear-gradient(-45deg, transparent 75%, #bbb 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    position: relative;
    overflow: hidden;
  }

  #canvas-wrapper {
    position: relative;
    image-rendering: pixelated;
    box-shadow: 0 2px 20px rgba(0,0,0,0.15);
  }

  #canvas-wrapper canvas {
    position: absolute;
    top: 0;
    left: 0;
    image-rendering: pixelated;
  }

  #main-canvas { z-index: 1; }
  #overlay-canvas { z-index: 2; }
  #grid-canvas { z-index: 3; pointer-events: none; }
  #cursor-canvas { z-index: 4; pointer-events: none; }

  /* Zoom indicator */
  #zoom-indicator {
    position: absolute;
    bottom: 8px;
    left: 8px;
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(255,255,255,0.9);
    padding: 2px 8px;
    border-radius: 4px;
    box-shadow: var(--shadow);
  }

  /* ── Right Panel (Layers) ── */
  #right-panel {
    width: 200px;
    background: var(--panel);
    border-left: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .layer-controls {
    display: flex;
    gap: 3px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--panel-border);
  }
  .layer-controls button {
    flex: 1;
    padding: 4px;
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    background: var(--panel);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.12s;
  }
  .layer-controls button:hover { border-color: var(--accent); }

  #layers-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }

  .layer-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 2px;
    border: 1px solid transparent;
    transition: all 0.1s;
  }
  .layer-item:hover { background: var(--tool-bg); }
  .layer-item.active { border-color: var(--accent); background: #eef0ff; }
  .layer-item .vis-btn {
    width: 20px;
    height: 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .layer-item .vis-btn:hover { background: var(--tool-bg); }
  .layer-thumb {
    width: 28px;
    height: 28px;
    border: 1px solid var(--panel-border);
    border-radius: 3px;
    image-rendering: pixelated;
    background-image:
      linear-gradient(45deg, #ddd 25%, transparent 25%),
      linear-gradient(-45deg, #ddd 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ddd 75%),
      linear-gradient(-45deg, transparent 75%, #ddd 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0;
    flex-shrink: 0;
  }
  .layer-name {
    flex: 1;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .layer-opacity {
    width: 36px;
    font-family: var(--mono);
    font-size: 10px;
    text-align: right;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  /* ── Bottom Panel (Animation Timeline) ── */
  #bottom-panel {
    height: 100px;
    background: var(--panel);
    border-top: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .anim-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-bottom: 1px solid var(--panel-border);
  }
  .anim-controls button {
    padding: 2px 8px;
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    background: var(--panel);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.12s;
  }
  .anim-controls button:hover { border-color: var(--accent); }
  .anim-controls button.playing { background: var(--accent); color: #fff; border-color: var(--accent); }

  .anim-controls label {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .anim-controls input[type="number"] {
    width: 40px;
    padding: 2px 4px;
    border: 1px solid var(--panel-border);
    border-radius: 3px;
    font-size: 11px;
    font-family: var(--mono);
  }
  .anim-controls .sep { flex: 1; }

  .onion-toggle {
    padding: 2px 8px;
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    background: var(--panel);
    cursor: pointer;
    font-size: 11px;
    transition: all 0.12s;
  }
  .onion-toggle:hover { border-color: var(--accent); }
  .onion-toggle.active { background: #fff3e0; border-color: #ff9800; color: #e65100; }

  #frames-strip {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    overflow-x: auto;
  }

  .frame-thumb {
    width: 56px;
    height: 56px;
    border: 2px solid var(--panel-border);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    image-rendering: pixelated;
    background-image:
      linear-gradient(45deg, #ddd 25%, transparent 25%),
      linear-gradient(-45deg, #ddd 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ddd 75%),
      linear-gradient(-45deg, transparent 75%, #ddd 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0;
    position: relative;
    transition: border-color 0.12s;
  }
  .frame-thumb:hover { border-color: var(--accent); }
  .frame-thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .frame-thumb .frame-num {
    position: absolute;
    bottom: 1px;
    right: 3px;
    font-size: 9px;
    font-family: var(--mono);
    color: var(--text-dim);
    background: rgba(255,255,255,0.8);
    padding: 0 3px;
    border-radius: 2px;
  }
  .frame-thumb .frame-del {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--danger);
    color: #fff;
    font-size: 9px;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .frame-thumb:hover .frame-del { display: flex; }
  .add-frame-btn {
    width: 56px;
    height: 56px;
    border: 2px dashed var(--panel-border);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--text-dim);
    background: transparent;
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .add-frame-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal {
    background: var(--panel);
    border-radius: 10px;
    padding: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    min-width: 320px;
  }
  .modal h3 { margin-bottom: 16px; font-size: 16px; }
  .modal label {
    display: block;
    font-size: 12px;
    margin-bottom: 4px;
    color: var(--text-dim);
  }
  .modal input[type="number"], .modal input[type="text"] {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .modal-row { display: flex; gap: 12px; }
  .modal-row > div { flex: 1; }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 8px;
  }
  .modal-actions button {
    padding: 6px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    transition: all 0.12s;
  }
  .modal-actions button.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .modal-actions button.primary:hover { background: var(--accent-hover); }

  /* ── Export dropdown ── */
  .export-menu {
    position: absolute;
    top: 100%;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    z-index: 100;
    min-width: 180px;
    padding: 4px;
    margin-top: 4px;
  }
  .export-menu button {
    display: block;
    width: 100%;
    padding: 8px 12px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
    border-radius: 4px;
    transition: background 0.1s;
  }
  .export-menu button:hover { background: var(--tool-bg); }
  .export-parent { position: relative; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #aaa; }

  /* Hidden helpers */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo"><span>Grit</span>paint</div>
  <div style="font-size:12px;color:var(--text-dim);" id="canvas-info"></div>
  <div class="header-btns">
    <button onclick="showNewDialog()">New</button>
    <button onclick="saveProject()">Save</button>
    <button onclick="document.getElementById('load-input').click()">Load</button>
    <input type="file" id="load-input" accept=".pxf" style="display:none" onchange="loadProject(event)">
    <div class="export-parent">
      <button class="primary" onclick="toggleExportMenu()">Export ▾</button>
      <div id="export-menu" class="export-menu hidden">
        <button onclick="exportPNG()">PNG (current frame)</button>
        <button onclick="exportSpriteSheet()">Sprite Sheet (PNG)</button>
        <button onclick="exportGIF()">Animated GIF</button>
        <button onclick="exportPalette()">Palette (.hex)</button>
      </div>
    </div>
  </div>
</div>

<!-- Main layout -->
<div id="main">
  <!-- Left Panel -->
  <div id="left-panel">
    <!-- Tools -->
    <div class="panel-section">
      <div class="panel-title">Tools</div>
      <div class="tools-grid" id="tools-grid"></div>
    </div>

    <!-- Brush Size -->
    <div class="panel-section">
      <div class="panel-title">Brush Size</div>
      <div class="brush-size-row">
        <input type="range" id="brush-size" min="1" max="16" value="1" oninput="brushSize=+this.value;document.getElementById('brush-val').textContent=this.value">
        <span class="size-val" id="brush-val">1</span>
      </div>
    </div>

    <!-- Colors -->
    <div class="panel-section">
      <div class="panel-title">Color</div>
      <div class="color-swatches">
        <div class="color-preview">
          <div class="color-fg" id="color-fg" onclick="pickColor('fg')"></div>
          <div class="color-bg-swatch" id="color-bg-swatch" onclick="pickColor('bg')"></div>
          <div class="color-swap" onclick="swapColors()" title="Swap (X)">⇄</div>
        </div>
        <div style="flex:1">
          <input type="color" id="fg-picker" style="display:none" onchange="setFg(this.value)">
          <input type="color" id="bg-picker" style="display:none" onchange="setBg(this.value)">
          <input type="text" id="color-input" value="#000000" onchange="setFg(this.value)" spellcheck="false">
          <div style="font-size:10px;color:var(--text-dim);">Hex value</div>
        </div>
      </div>
    </div>

    <!-- Palette -->
    <div class="panel-section" style="border-bottom:none;flex:1;">
      <div class="panel-title">Palette</div>
      <div class="palette-grid" id="palette-grid"></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="main-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <canvas id="grid-canvas"></canvas>
      <canvas id="cursor-canvas"></canvas>
    </div>
    <div id="zoom-indicator">100%</div>
  </div>

  <!-- Right Panel (Layers) -->
  <div id="right-panel">
    <div class="panel-section" style="padding-bottom:6px;">
      <div class="panel-title">Layers</div>
    </div>
    <div class="layer-controls">
      <button onclick="addLayer()" title="Add Layer">＋</button>
      <button onclick="deleteLayer()" title="Delete Layer">🗑</button>
      <button onclick="moveLayer(-1)" title="Move Up">▲</button>
      <button onclick="moveLayer(1)" title="Move Down">▼</button>
    </div>
    <div class="panel-section" style="padding:6px 10px;">
      <div class="brush-size-row">
        <label style="font-size:11px;color:var(--text-dim);white-space:nowrap;">Opacity</label>
        <input type="range" id="layer-opacity" min="0" max="100" value="100" oninput="setLayerOpacity(+this.value)">
        <span class="size-val" id="opacity-val">100</span>
      </div>
    </div>
    <div id="layers-list"></div>
  </div>
</div>

<!-- Bottom Panel (Timeline) -->
<div id="bottom-panel">
  <div class="anim-controls">
    <button onclick="prevFrame()">◀</button>
    <button id="play-btn" onclick="togglePlay()">▶</button>
    <button onclick="nextFrame()">▶▶</button>
    <label>FPS <input type="number" id="fps-input" value="8" min="1" max="60" onchange="animFPS=+this.value"></label>
    <span class="sep"></span>
    <button class="onion-toggle" id="onion-btn" onclick="toggleOnion()">Onion Skin</button>
    <span style="font-size:11px;color:var(--text-dim);" id="frame-info">Frame 1/1</span>
  </div>
  <div id="frames-strip">
    <!-- frames rendered here -->
  </div>
</div>

<!-- New Project Modal -->
<div id="new-modal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal">
    <h3>New Project</h3>
    <div class="modal-row">
      <div>
        <label>Width (px)</label>
        <input type="number" id="new-width" value="32" min="1" max="512">
      </div>
      <div>
        <label>Height (px)</label>
        <input type="number" id="new-height" value="32" min="1" max="512">
      </div>
    </div>
    <div class="modal-actions">
      <button onclick="document.getElementById('new-modal').classList.add('hidden')">Cancel</button>
      <button class="primary" onclick="createNewProject()">Create</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// GRITPAINT — Core State
// ═══════════════════════════════════════════════════════════════

let W = 32, H = 32;
let zoom = 12;
let frames = [];       // frames[frameIdx] = { layers: [ { name, visible, opacity, data (ImageData) } ] }
let currentFrame = 0;
let currentLayer = 0;
let fgColor = '#000000';
let bgColor = '#ffffff';
let currentTool = 'pencil';
let brushSize = 1;
let animFPS = 8;
let isPlaying = false;
let playInterval = null;
let onionSkin = false;
let undoStack = [];
let redoStack = [];
const MAX_UNDO = 40;
let nextLayerId = 1;

// Canvas refs
const mainCanvas = document.getElementById('main-canvas');
const overlayCanvas = document.getElementById('overlay-canvas');
const gridCanvas = document.getElementById('grid-canvas');
const cursorCanvas = document.getElementById('cursor-canvas');
const mainCtx = mainCanvas.getContext('2d');
const overlayCtx = overlayCanvas.getContext('2d');
const gridCtx = gridCanvas.getContext('2d');
const cursorCtx = cursorCanvas.getContext('2d');

// ═══════════════════════════════════════════════════════════════
// TOOLS
// ═══════════════════════════════════════════════════════════════

const TOOLS = [
  { id: 'pencil',    icon: '✏', key: 'B' },
  { id: 'eraser',    icon: '◻', key: 'E' },
  { id: 'fill',      icon: '🪣', key: 'G' },
  { id: 'eyedropper',icon: '💧', key: 'I' },
  { id: 'line',      icon: '╱',  key: 'L' },
  { id: 'rect',      icon: '▭',  key: 'R' },
  { id: 'ellipse',   icon: '◯', key: 'O' },
  { id: 'move',      icon: '✥',  key: 'M' },
];

function buildToolbar() {
  const grid = document.getElementById('tools-grid');
  grid.innerHTML = '';
  TOOLS.forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'tool-btn' + (t.id === currentTool ? ' active' : '');
    btn.innerHTML = `${t.icon}<span class="shortcut">${t.key}</span>`;
    btn.title = `${t.id} (${t.key})`;
    btn.onclick = () => selectTool(t.id);
    btn.dataset.tool = t.id;
    grid.appendChild(btn);
  });
}

function selectTool(id) {
  currentTool = id;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === id));
}

// ═══════════════════════════════════════════════════════════════
// PROJECT / FRAMES / LAYERS
// ═══════════════════════════════════════════════════════════════

function createBlankLayer(name) {
  const data = new ImageData(W, H);
  return { id: nextLayerId++, name: name || `Layer ${Date.now() % 1000}`, visible: true, opacity: 100, data, offCanvas: new Map() };
}

function createBlankFrame() {
  return { layers: [createBlankLayer('Layer 1')] };
}

function findLayerById(frameIdx, layerId) {
  const layers = frames[frameIdx].layers;
  for (let i = 0; i < layers.length; i++) {
    if (layers[i].id === layerId) return { layer: layers[i], index: i };
  }
  return null;
}

function initProject(w, h) {
  W = w; H = h;
  nextLayerId = 1;
  frames = [createBlankFrame()];
  currentFrame = 0;
  currentLayer = 0;
  undoStack = [];
  redoStack = [];
  resizeCanvases();
  renderAll();
}

function resizeCanvases() {
  const pw = W * zoom, ph = H * zoom;
  [mainCanvas, overlayCanvas, gridCanvas, cursorCanvas].forEach(c => {
    c.width = pw; c.height = ph;
    c.style.width = pw + 'px';
    c.style.height = ph + 'px';
  });
  const wrapper = document.getElementById('canvas-wrapper');
  wrapper.style.width = pw + 'px';
  wrapper.style.height = ph + 'px';
  document.getElementById('canvas-info').textContent = `${W} × ${H}`;
  document.getElementById('zoom-indicator').textContent = `${Math.round(zoom / 1 * 100)}%`;
  drawGrid();
}

function drawGrid() {
  gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
  if (zoom < 4) return;
  gridCtx.strokeStyle = 'rgba(0,0,0,0.1)';
  gridCtx.lineWidth = 0.5;
  for (let x = 0; x <= W; x++) {
    gridCtx.beginPath();
    gridCtx.moveTo(x * zoom, 0);
    gridCtx.lineTo(x * zoom, H * zoom);
    gridCtx.stroke();
  }
  for (let y = 0; y <= H; y++) {
    gridCtx.beginPath();
    gridCtx.moveTo(0, y * zoom);
    gridCtx.lineTo(W * zoom, y * zoom);
    gridCtx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════

function compositeFrame(frameIdx) {
  // Returns an ImageData of the composited frame
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = W; tmpCanvas.height = H;
  const ctx = tmpCanvas.getContext('2d');
  const frame = frames[frameIdx];
  // Draw layers bottom to top
  for (let i = frame.layers.length - 1; i >= 0; i--) {
    const layer = frame.layers[i];
    if (!layer.visible) continue;
    ctx.globalAlpha = layer.opacity / 100;
    const lc = document.createElement('canvas');
    lc.width = W; lc.height = H;
    lc.getContext('2d').putImageData(layer.data, 0, 0);
    ctx.drawImage(lc, 0, 0);
  }
  ctx.globalAlpha = 1;
  return tmpCanvas;
}

function renderMain() {
  mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
  mainCtx.imageSmoothingEnabled = false;

  // Onion skin: previous frame
  if (onionSkin && currentFrame > 0 && !isPlaying) {
    const prev = compositeFrame(currentFrame - 1);
    mainCtx.globalAlpha = 0.2;
    mainCtx.drawImage(prev, 0, 0, W * zoom, H * zoom);
  }

  mainCtx.globalAlpha = 1;
  const comp = compositeFrame(currentFrame);
  mainCtx.drawImage(comp, 0, 0, W * zoom, H * zoom);

  // Onion skin: next frame
  if (onionSkin && currentFrame < frames.length - 1 && !isPlaying) {
    const next = compositeFrame(currentFrame + 1);
    mainCtx.globalAlpha = 0.15;
    mainCtx.drawImage(next, 0, 0, W * zoom, H * zoom);
    mainCtx.globalAlpha = 1;
  }
}

function renderAll() {
  renderMain();
  renderLayersList();
  renderFrameStrip();
  document.getElementById('frame-info').textContent = `Frame ${currentFrame + 1}/${frames.length}`;
}

// ═══════════════════════════════════════════════════════════════
// LAYER UI
// ═══════════════════════════════════════════════════════════════

function renderLayersList() {
  const list = document.getElementById('layers-list');
  list.innerHTML = '';
  const frame = frames[currentFrame];
  frame.layers.forEach((layer, i) => {
    const el = document.createElement('div');
    el.className = 'layer-item' + (i === currentLayer ? ' active' : '');
    el.onclick = () => { currentLayer = i; renderAll(); updateOpacitySlider(); };
    el.ondblclick = () => renameLayer(i);

    const vis = document.createElement('button');
    vis.className = 'vis-btn';
    vis.textContent = layer.visible ? '👁' : '–';
    vis.onclick = (e) => { e.stopPropagation(); layer.visible = !layer.visible; renderAll(); };

    const thumb = document.createElement('canvas');
    thumb.className = 'layer-thumb';
    thumb.width = 28; thumb.height = 28;
    const tc = thumb.getContext('2d');
    tc.imageSmoothingEnabled = false;
    const tmpC = document.createElement('canvas');
    tmpC.width = W; tmpC.height = H;
    tmpC.getContext('2d').putImageData(layer.data, 0, 0);
    tc.drawImage(tmpC, 0, 0, 28, 28);

    const name = document.createElement('span');
    name.className = 'layer-name';
    name.textContent = layer.name;

    const opac = document.createElement('span');
    opac.className = 'layer-opacity';
    opac.textContent = layer.opacity + '%';

    el.appendChild(vis);
    el.appendChild(thumb);
    el.appendChild(name);
    el.appendChild(opac);
    list.appendChild(el);
  });
  updateOpacitySlider();
}

function updateOpacitySlider() {
  const frame = frames[currentFrame];
  if (frame.layers[currentLayer]) {
    document.getElementById('layer-opacity').value = frame.layers[currentLayer].opacity;
    document.getElementById('opacity-val').textContent = frame.layers[currentLayer].opacity;
  }
}

function setLayerOpacity(v) {
  const frame = frames[currentFrame];
  if (frame.layers[currentLayer]) {
    frame.layers[currentLayer].opacity = v;
    document.getElementById('opacity-val').textContent = v;
    renderAll();
  }
}

function addLayer() {
  const frame = frames[currentFrame];
  const layer = createBlankLayer('Layer ' + (frame.layers.length + 1));
  frame.layers.splice(currentLayer, 0, layer);
  renderAll();
}

function deleteLayer() {
  const frame = frames[currentFrame];
  if (frame.layers.length <= 1) return;
  if (!confirm(`Delete "${frame.layers[currentLayer].name}"? This cannot be undone.`)) return;
  frame.layers.splice(currentLayer, 1);
  if (currentLayer >= frame.layers.length) currentLayer = frame.layers.length - 1;
  renderAll();
}

function moveLayer(dir) {
  const frame = frames[currentFrame];
  const newIdx = currentLayer + dir;
  if (newIdx < 0 || newIdx >= frame.layers.length) return;
  const tmp = frame.layers[currentLayer];
  frame.layers[currentLayer] = frame.layers[newIdx];
  frame.layers[newIdx] = tmp;
  currentLayer = newIdx;
  renderAll();
}

function renameLayer(i) {
  const name = prompt('Layer name:', frames[currentFrame].layers[i].name);
  if (name !== null) {
    frames[currentFrame].layers[i].name = name;
    renderAll();
  }
}

// ═══════════════════════════════════════════════════════════════
// FRAME STRIP UI
// ═══════════════════════════════════════════════════════════════

function renderFrameStrip() {
  const strip = document.getElementById('frames-strip');
  strip.innerHTML = '';
  frames.forEach((frame, i) => {
    const div = document.createElement('div');
    div.className = 'frame-thumb' + (i === currentFrame ? ' active' : '');
    const comp = compositeFrame(i);
    const thumbCanvas = document.createElement('canvas');
    thumbCanvas.width = 56; thumbCanvas.height = 56;
    const tc = thumbCanvas.getContext('2d');
    tc.imageSmoothingEnabled = false;
    const scale = Math.min(56 / W, 56 / H);
    const dx = (56 - W * scale) / 2, dy = (56 - H * scale) / 2;
    tc.drawImage(comp, dx, dy, W * scale, H * scale);
    div.style.background = '';
    div.appendChild(thumbCanvas);
    thumbCanvas.style.width = '100%'; thumbCanvas.style.height = '100%';
    thumbCanvas.style.borderRadius = '2px';

    const num = document.createElement('span');
    num.className = 'frame-num';
    num.textContent = i + 1;
    div.appendChild(num);

    if (frames.length > 1) {
      const del = document.createElement('button');
      del.className = 'frame-del';
      del.textContent = '×';
      del.onclick = (e) => { e.stopPropagation(); deleteFrame(i); };
      div.appendChild(del);
    }

    div.onclick = () => { currentFrame = i; currentLayer = Math.min(currentLayer, frames[currentFrame].layers.length - 1); renderAll(); };
    strip.appendChild(div);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-frame-btn';
  addBtn.textContent = '+';
  addBtn.onclick = addFrame;
  strip.appendChild(addBtn);
}

function addFrame() {
  // Duplicate current frame with fresh layer IDs
  const src = frames[currentFrame];
  const newFrame = { layers: src.layers.map(l => ({
    id: nextLayerId++,
    name: l.name,
    visible: l.visible,
    opacity: l.opacity,
    data: new ImageData(new Uint8ClampedArray(l.data.data), W, H),
    offCanvas: cloneOffCanvas(l.offCanvas)
  }))};
  frames.splice(currentFrame + 1, 0, newFrame);
  currentFrame++;
  renderAll();
}

function deleteFrame(i) {
  if (frames.length <= 1) return;
  frames.splice(i, 1);
  if (currentFrame >= frames.length) currentFrame = frames.length - 1;
  renderAll();
}

function prevFrame() {
  currentFrame = (currentFrame - 1 + frames.length) % frames.length;
  currentLayer = Math.min(currentLayer, frames[currentFrame].layers.length - 1);
  renderAll();
}

function nextFrame() {
  currentFrame = (currentFrame + 1) % frames.length;
  currentLayer = Math.min(currentLayer, frames[currentFrame].layers.length - 1);
  renderAll();
}

  renderMain();
}

// ═══════════════════════════════════════════════════════════════
// UNDO / REDO
// ═══════════════════════════════════════════════════════════════

function cloneOffCanvas(m) {
  const c = new Map();
  if (m) m.forEach((v, k) => c.set(k, v.slice()));
  return c;
}

function pushUndo() {
  // Deep clone current frame's current layer data + offCanvas, keyed by layer ID
  const layer = frames[currentFrame].layers[currentLayer];
  undoStack.push({
    frame: currentFrame,
    layerId: layer.id,
    data: new Uint8ClampedArray(layer.data.data),
    offCanvas: cloneOffCanvas(layer.offCanvas)
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length === 0) return;
  const entry = undoStack.pop();
  if (entry.frame >= frames.length) return; // frame was deleted
  const found = findLayerById(entry.frame, entry.layerId);
  if (!found) return; // layer was deleted, skip
  redoStack.push({
    frame: entry.frame,
    layerId: entry.layerId,
    data: new Uint8ClampedArray(found.layer.data.data),
    offCanvas: cloneOffCanvas(found.layer.offCanvas)
  });
  found.layer.data = new ImageData(entry.data, W, H);
  found.layer.offCanvas = entry.offCanvas;
  currentFrame = entry.frame;
  currentLayer = found.index;
  renderAll();
}

function redo() {
  if (redoStack.length === 0) return;
  const entry = redoStack.pop();
  if (entry.frame >= frames.length) return; // frame was deleted
  const found = findLayerById(entry.frame, entry.layerId);
  if (!found) return; // layer was deleted, skip
  undoStack.push({
    frame: entry.frame,
    layerId: entry.layerId,
    data: new Uint8ClampedArray(found.layer.data.data),
    offCanvas: cloneOffCanvas(found.layer.offCanvas)
  });
  found.layer.data = new ImageData(entry.data, W, H);
  found.layer.offCanvas = entry.offCanvas;
  currentFrame = entry.frame;
  currentLayer = found.index;
  renderAll();
}

// ═══════════════════════════════════════════════════════════════
// DRAWING ENGINE
// ═══════════════════════════════════════════════════════════════

function hexToRGBA(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b, 255];
}

function getPixel(data, x, y) {
  if (x < 0 || x >= W || y < 0 || y >= H) return [0, 0, 0, 0];
  const i = (y * W + x) * 4;
  return [data.data[i], data.data[i+1], data.data[i+2], data.data[i+3]];
}

function setPixel(data, x, y, rgba) {
  if (x < 0 || x >= W || y < 0 || y >= H) return;
  const i = (y * W + x) * 4;
  data.data[i] = rgba[0];
  data.data[i+1] = rgba[1];
  data.data[i+2] = rgba[2];
  data.data[i+3] = rgba[3];
}

function drawPixelBrush(data, cx, cy, color) {
  const half = Math.floor(brushSize / 2);
  for (let dy = 0; dy < brushSize; dy++) {
    for (let dx = 0; dx < brushSize; dx++) {
      setPixel(data, cx - half + dx, cy - half + dy, color);
    }
  }
}

function bresenhamLine(x0, y0, x1, y1, callback) {
  const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  while (true) {
    callback(x0, y0);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx) { err += dx; y0 += sy; }
  }
}

function floodFill(data, sx, sy, fillColor) {
  const target = getPixel(data, sx, sy);
  if (target[0] === fillColor[0] && target[1] === fillColor[1] && target[2] === fillColor[2] && target[3] === fillColor[3]) return;
  const stack = [[sx, sy]];
  const visited = new Set();
  while (stack.length > 0) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= W || y < 0 || y >= H) continue;
    const key = y * W + x;
    if (visited.has(key)) continue;
    const p = getPixel(data, x, y);
    if (p[0] !== target[0] || p[1] !== target[1] || p[2] !== target[2] || p[3] !== target[3]) continue;
    visited.add(key);
    setPixel(data, x, y, fillColor);
    stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
  }
}

function drawEllipsePixels(data, x0, y0, x1, y1, color) {
  // Midpoint ellipse algorithm on bounding box
  let left = Math.min(x0, x1), right = Math.max(x0, x1);
  let top = Math.min(y0, y1), bottom = Math.max(y0, y1);
  const cx = (left + right) / 2, cy = (top + bottom) / 2;
  const rx = (right - left) / 2, ry = (bottom - top) / 2;
  if (rx < 0.5 || ry < 0.5) return;
  for (let angle = 0; angle < Math.PI * 2; angle += 0.01) {
    const px = Math.round(cx + rx * Math.cos(angle));
    const py = Math.round(cy + ry * Math.sin(angle));
    drawPixelBrush(data, px, py, color);
  }
}

function drawRectPixels(data, x0, y0, x1, y1, color) {
  const left = Math.min(x0, x1), right = Math.max(x0, x1);
  const top = Math.min(y0, y1), bottom = Math.max(y0, y1);
  for (let x = left; x <= right; x++) {
    drawPixelBrush(data, x, top, color);
    drawPixelBrush(data, x, bottom, color);
  }
  for (let y = top; y <= bottom; y++) {
    drawPixelBrush(data, left, y, color);
    drawPixelBrush(data, right, y, color);
  }
}

// ═══════════════════════════════════════════════════════════════
// MOUSE HANDLING
// ═══════════════════════════════════════════════════════════════

let drawing = false;
let lastPx = null, lastPy = null;
let shapeStart = null;
let moveStart = null;
let moveAllPixels = null; // Array of {x, y, r, g, b, a} — all pixels including off-canvas

function canvasPos(e) {
  const rect = overlayCanvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / zoom);
  const y = Math.floor((e.clientY - rect.top) / zoom);
  return [x, y];
}

overlayCanvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (isPlaying) return;
  const [px, py] = canvasPos(e);
  const layer = frames[currentFrame].layers[currentLayer];
  if (!layer.visible) return;

  const isRight = e.button === 2;
  const drawColor = currentTool === 'eraser' ? [0, 0, 0, 0] :
                    hexToRGBA(isRight ? bgColor : fgColor);

  if (currentTool === 'eyedropper') {
    // Sample from composited frame
    const comp = compositeFrame(currentFrame);
    const ctx = comp.getContext('2d');
    const idata = ctx.getImageData(0, 0, W, H);
    const p = getPixel(idata, px, py);
    const hex = '#' + [p[0],p[1],p[2]].map(v => v.toString(16).padStart(2,'0')).join('');
    if (isRight) setBg(hex); else setFg(hex);
    return;
  }

  drawing = true;
  pushUndo();

  if (currentTool === 'pencil' || currentTool === 'eraser') {
    drawPixelBrush(layer.data, px, py, drawColor);
    lastPx = px; lastPy = py;
    renderMain();
  } else if (currentTool === 'fill') {
    floodFill(layer.data, px, py, drawColor);
    renderMain();
    drawing = false;
  } else if (currentTool === 'line' || currentTool === 'rect' || currentTool === 'ellipse') {
    shapeStart = [px, py];
    lastPx = px; lastPy = py;
  } else if (currentTool === 'move') {
    moveStart = [px, py];
    // Collect ALL pixels: on-canvas from layer.data + off-canvas from layer.offCanvas
    moveAllPixels = [];
    const d = layer.data.data;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const i = (y * W + x) * 4;
        if (d[i+3] > 0) {
          moveAllPixels.push({ x, y, r: d[i], g: d[i+1], b: d[i+2], a: d[i+3] });
        }
      }
    }
    if (layer.offCanvas) {
      layer.offCanvas.forEach((rgba, key) => {
        const [ox, oy] = key.split(',').map(Number);
        moveAllPixels.push({ x: ox, y: oy, r: rgba[0], g: rgba[1], b: rgba[2], a: rgba[3] });
      });
    }
  }
});

overlayCanvas.addEventListener('mousemove', (e) => {
  const [px, py] = canvasPos(e);
  drawCursor(px, py);

  if (!drawing) return;
  const layer = frames[currentFrame].layers[currentLayer];
  const drawColor = currentTool === 'eraser' ? [0, 0, 0, 0] : hexToRGBA(fgColor);

  if (currentTool === 'pencil' || currentTool === 'eraser') {
    if (lastPx !== null) {
      bresenhamLine(lastPx, lastPy, px, py, (x, y) => drawPixelBrush(layer.data, x, y, drawColor));
    }
    lastPx = px; lastPy = py;
    renderMain();
  } else if ((currentTool === 'line' || currentTool === 'rect' || currentTool === 'ellipse') && shapeStart) {
    // Preview on overlay
    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    overlayCtx.imageSmoothingEnabled = false;
    // Draw preview shape on a temp canvas
    const tmp = new ImageData(W, H);
    const color = hexToRGBA(fgColor);
    if (currentTool === 'line') {
      bresenhamLine(shapeStart[0], shapeStart[1], px, py, (x, y) => drawPixelBrush(tmp, x, y, color));
    } else if (currentTool === 'rect') {
      drawRectPixels(tmp, shapeStart[0], shapeStart[1], px, py, color);
    } else if (currentTool === 'ellipse') {
      drawEllipsePixels(tmp, shapeStart[0], shapeStart[1], px, py, color);
    }
    const tc = document.createElement('canvas');
    tc.width = W; tc.height = H;
    tc.getContext('2d').putImageData(tmp, 0, 0);
    overlayCtx.drawImage(tc, 0, 0, W * zoom, H * zoom);
  } else if (currentTool === 'move' && moveStart) {
    const dx = px - moveStart[0], dy = py - moveStart[1];
    // Clear layer and write shifted pixels (only visible ones)
    const newData = new ImageData(W, H);
    for (const p of moveAllPixels) {
      const nx = p.x + dx, ny = p.y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const di = (ny * W + nx) * 4;
        newData.data[di] = p.r;
        newData.data[di+1] = p.g;
        newData.data[di+2] = p.b;
        newData.data[di+3] = p.a;
      }
    }
    layer.data = newData;
    renderMain();
  }
});

overlayCanvas.addEventListener('mouseup', (e) => {
  if (!drawing) return;
  const [px, py] = canvasPos(e);
  const layer = frames[currentFrame].layers[currentLayer];
  const drawColor = hexToRGBA(fgColor);

  if ((currentTool === 'line' || currentTool === 'rect' || currentTool === 'ellipse') && shapeStart) {
    if (currentTool === 'line') {
      bresenhamLine(shapeStart[0], shapeStart[1], px, py, (x, y) => drawPixelBrush(layer.data, x, y, drawColor));
    } else if (currentTool === 'rect') {
      drawRectPixels(layer.data, shapeStart[0], shapeStart[1], px, py, drawColor);
    } else if (currentTool === 'ellipse') {
      drawEllipsePixels(layer.data, shapeStart[0], shapeStart[1], px, py, drawColor);
    }
    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  }

  // Move tool: commit on-canvas and off-canvas pixels
  if (currentTool === 'move' && moveStart && moveAllPixels) {
    const dx = px - moveStart[0], dy = py - moveStart[1];
    const newData = new ImageData(W, H);
    const newOff = new Map();
    for (const p of moveAllPixels) {
      const nx = p.x + dx, ny = p.y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const di = (ny * W + nx) * 4;
        newData.data[di] = p.r;
        newData.data[di+1] = p.g;
        newData.data[di+2] = p.b;
        newData.data[di+3] = p.a;
      } else {
        newOff.set(`${nx},${ny}`, [p.r, p.g, p.b, p.a]);
      }
    }
    layer.data = newData;
    layer.offCanvas = newOff;
  }

  drawing = false;
  shapeStart = null;
  lastPx = null; lastPy = null;
  moveStart = null;
  moveAllPixels = null;
  renderAll();
});

overlayCanvas.addEventListener('mouseleave', () => {
  cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
});

overlayCanvas.addEventListener('contextmenu', (e) => e.preventDefault());

function drawCursor(px, py) {
  cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
  const half = Math.floor(brushSize / 2);
  cursorCtx.strokeStyle = 'rgba(0,0,0,0.5)';
  cursorCtx.lineWidth = 1;
  cursorCtx.strokeRect((px - half) * zoom, (py - half) * zoom, brushSize * zoom, brushSize * zoom);
}

// ═══════════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════════

document.getElementById('canvas-area').addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.deltaY < 0) {
    zoom = Math.min(80, zoom + (zoom < 8 ? 1 : zoom < 20 ? 2 : 4));
  } else {
    zoom = Math.max(1, zoom - (zoom <= 8 ? 1 : zoom <= 20 ? 2 : 4));
  }
  resizeCanvases();
  renderMain();
}, { passive: false });

// ═══════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const key = e.key.toLowerCase();
  if (e.ctrlKey || e.metaKey) {
    if (key === 'z') { e.preventDefault(); if (e.shiftKey) redo(); else undo(); }
    if (key === 'y') { e.preventDefault(); redo(); }
    return;
  }
  TOOLS.forEach(t => { if (key === t.key.toLowerCase()) selectTool(t.id); });
  if (key === 'x') swapColors();
  if (key === '[') { brushSize = Math.max(1, brushSize - 1); document.getElementById('brush-size').value = brushSize; document.getElementById('brush-val').textContent = brushSize; }
  if (key === ']') { brushSize = Math.min(16, brushSize + 1); document.getElementById('brush-size').value = brushSize; document.getElementById('brush-val').textContent = brushSize; }
  if (key === ',') prevFrame();
  if (key === '.') nextFrame();
  if (key === ' ') { e.preventDefault(); togglePlay(); }
});

// NEW PROJECT
// ═══════════════════════════════════════════════════════════════

function showNewDialog() {
  document.getElementById('new-modal').classList.remove('hidden');
}

function createNewProject() {
  const w = Math.max(1, Math.min(512, +document.getElementById('new-width').value));
  const h = Math.max(1, Math.min(512, +document.getElementById('new-height').value));
  document.getElementById('new-modal').classList.add('hidden');
  initProject(w, h);
}

// ═══════════════════════════════════════════════════════════════
// SAVE / LOAD (.pxf JSON)
// ═══════════════════════════════════════════════════════════════

function saveProject() {
  const project = {
    version: 2,
    width: W,
    height: H,
    frames: frames.map(f => ({
      layers: f.layers.map(l => {
        const off = {};
        if (l.offCanvas) l.offCanvas.forEach((v, k) => { off[k] = v; });
        return {
          name: l.name,
          visible: l.visible,
          opacity: l.opacity,
          data: Array.from(l.data.data),
          offCanvas: off
        };
      })
    }))
  };
  const blob = new Blob([JSON.stringify(project)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'gritpaint-project.pxf';
  a.click();
  URL.revokeObjectURL(url);
}

function loadProject(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const project = JSON.parse(reader.result);
      W = project.width; H = project.height;
      nextLayerId = 1;
      frames = project.frames.map(f => ({
        layers: f.layers.map(l => {
          const off = new Map();
          if (l.offCanvas) {
            Object.keys(l.offCanvas).forEach(k => off.set(k, l.offCanvas[k]));
          }
          return {
            id: nextLayerId++,
            name: l.name,
            visible: l.visible,
            opacity: l.opacity,
            data: new ImageData(new Uint8ClampedArray(l.data), W, H),
            offCanvas: off
          };
        })
      }));
      currentFrame = 0;
      currentLayer = 0;
      undoStack = [];
      redoStack = [];
      zoom = Math.max(1, Math.min(40, Math.floor(400 / Math.max(W, H))));
      resizeCanvases();
      renderAll();
    } catch(err) { alert('Invalid project file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ═══════════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════════

function toggleExportMenu() {
  document.getElementById('export-menu').classList.toggle('hidden');
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.export-parent')) {
    document.getElementById('export-menu').classList.add('hidden');
  }
});

function exportPNG() {
  const canvas = compositeFrame(currentFrame);
  const url = canvas.toDataURL('image/png');
  downloadURL(url, `gritpaint-frame${currentFrame + 1}.png`);
  document.getElementById('export-menu').classList.add('hidden');
}

function exportSpriteSheet() {
  const cols = Math.ceil(Math.sqrt(frames.length));
  const rows = Math.ceil(frames.length / cols);
  const canvas = document.createElement('canvas');
  canvas.width = W * cols; canvas.height = H * rows;
  const ctx = canvas.getContext('2d');
  frames.forEach((_, i) => {
    const comp = compositeFrame(i);
    const col = i % cols, row = Math.floor(i / cols);
    ctx.drawImage(comp, col * W, row * H);
  });
  const url = canvas.toDataURL('image/png');
  downloadURL(url, 'gritpaint-spritesheet.png');
  document.getElementById('export-menu').classList.add('hidden');
}

function exportPalette() {
  // Collect all unique colors
  const colors = new Set();
  frames.forEach((frame) => {
    frame.layers.forEach(layer => {
      const d = layer.data.data;
      for (let i = 0; i < d.length; i += 4) {
        if (d[i+3] > 0) {
          colors.add(`${d[i].toString(16).padStart(2,'0')}${d[i+1].toString(16).padStart(2,'0')}${d[i+2].toString(16).padStart(2,'0')}`);
        }
      }
    });
  });
  const hex = [...colors].join('\n');
  const blob = new Blob([hex], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  downloadURL(url, 'gritpaint-palette.hex');
  URL.revokeObjectURL(url);
  document.getElementById('export-menu').classList.add('hidden');
}

function downloadURL(url, filename) {
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
}

// ═══════════════════════════════════════════════════════════════
// GIF ENCODER (zero-dependency LZW GIF89a)
// ═══════════════════════════════════════════════════════════════

function exportGIF() {
  document.getElementById('export-menu').classList.add('hidden');

  // Collect all frames as RGBA
  const frameImages = frames.map((_, i) => {
    const c = compositeFrame(i);
    return c.getContext('2d').getImageData(0, 0, W, H);
  });

  // Build global color table from all frames (max 256 colors with quantization)
  const colorMap = new Map();
  let colorList = [];
  let hasTransparency = false;

  frameImages.forEach(img => {
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      if (d[i+3] < 128) { hasTransparency = true; continue; }
      const key = (d[i] << 16) | (d[i+1] << 8) | d[i+2];
      if (!colorMap.has(key)) {
        colorMap.set(key, colorList.length);
        colorList.push([d[i], d[i+1], d[i+2]]);
      }
    }
  });

  // Quantize to 255 colors if needed (leave room for transparency)
  const maxColors = hasTransparency ? 255 : 256;
  if (colorList.length > maxColors) {
    // Simple uniform quantization
    colorList = colorList.slice(0, maxColors);
    colorMap.clear();
    colorList.forEach((c, i) => colorMap.set((c[0] << 16) | (c[1] << 8) | c[2], i));
  }

  const transparentIndex = hasTransparency ? colorList.length : -1;
  if (hasTransparency) colorList.push([0, 0, 0]);

  // Pad to power of 2
  const colorBits = Math.max(2, Math.ceil(Math.log2(colorList.length)));
  const tableSize = 1 << colorBits;
  while (colorList.length < tableSize) colorList.push([0, 0, 0]);

  // Find nearest color for quantized palette
  function nearestColor(r, g, b) {
    let best = 0, bestDist = Infinity;
    const limit = hasTransparency ? colorList.length - 1 : colorList.length;
    for (let i = 0; i < limit; i++) {
      const dr = r - colorList[i][0], dg = g - colorList[i][1], db = b - colorList[i][2];
      const dist = dr*dr + dg*dg + db*db;
      if (dist === 0) return i;
      if (dist < bestDist) { bestDist = dist; best = i; }
    }
    return best;
  }

  // Map frame pixels to indices
  const indexedFrames = frameImages.map(img => {
    const indices = new Uint8Array(W * H);
    const d = img.data;
    for (let i = 0; i < W * H; i++) {
      const pi = i * 4;
      if (d[pi+3] < 128) {
        indices[i] = transparentIndex;
      } else {
        const key = (d[pi] << 16) | (d[pi+1] << 8) | d[pi+2];
        indices[i] = colorMap.has(key) ? colorMap.get(key) : nearestColor(d[pi], d[pi+1], d[pi+2]);
      }
    }
    return indices;
  });

  // Build GIF binary
  const buf = [];
  const write = (b) => buf.push(b & 0xFF);
  const writeStr = (s) => { for (let i = 0; i < s.length; i++) write(s.charCodeAt(i)); };
  const write16 = (v) => { write(v & 0xFF); write((v >> 8) & 0xFF); };

  // Header
  writeStr('GIF89a');
  write16(W); write16(H);
  write(0x80 | ((colorBits - 1) << 4) | (colorBits - 1)); // GCT flag
  write(0); // bg color
  write(0); // pixel aspect

  // Global Color Table
  colorList.forEach(c => { write(c[0]); write(c[1]); write(c[2]); });

  // Netscape extension for looping
  write(0x21); write(0xFF); write(11);
  writeStr('NETSCAPE2.0');
  write(3); write(1); write16(0); write(0);

  const delay = Math.round(100 / animFPS);

  // Frames
  indexedFrames.forEach(indices => {
    // Graphic Control Extension
    write(0x21); write(0xF9); write(4);
    write(hasTransparency ? 0x09 : 0x08); // disposal: restore to bg, transparent flag
    write16(delay);
    write(hasTransparency ? transparentIndex : 0);
    write(0);

    // Image Descriptor
    write(0x2C);
    write16(0); write16(0); write16(W); write16(H);
    write(0); // no local color table

    // LZW compressed data
    const minCode = colorBits;
    write(minCode);

    // LZW encoding
    const lzwOutput = [];
    const clearCode = 1 << minCode;
    const eoiCode = clearCode + 1;
    let codeSize = minCode + 1;
    let nextCode = eoiCode + 1;
    let table = {};

    function initTable() {
      table = {};
      for (let i = 0; i < clearCode; i++) table[String(i)] = i;
      nextCode = eoiCode + 1;
      codeSize = minCode + 1;
    }

    // Bit packer
    let bitBuf = 0, bitCount = 0;
    const subBlocks = [];
    let subBuf = [];

    function writeBits(code, size) {
      bitBuf |= (code << bitCount);
      bitCount += size;
      while (bitCount >= 8) {
        subBuf.push(bitBuf & 0xFF);
        bitBuf >>= 8;
        bitCount -= 8;
        if (subBuf.length === 255) {
          subBlocks.push(subBuf);
          subBuf = [];
        }
      }
    }

    initTable();
    writeBits(clearCode, codeSize);

    let prev = String(indices[0]);
    for (let i = 1; i < indices.length; i++) {
      const cur = String(indices[i]);
      const combined = prev + ',' + cur;
      if (table[combined] !== undefined) {
        prev = combined;
      } else {
        writeBits(table[prev], codeSize);
        if (nextCode < 4096) {
          table[combined] = nextCode++;
          if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
        } else {
          writeBits(clearCode, codeSize);
          initTable();
        }
        prev = cur;
      }
    }
    writeBits(table[prev], codeSize);
    writeBits(eoiCode, codeSize);

    // Flush remaining bits
    if (bitCount > 0) subBuf.push(bitBuf & 0xFF);
    if (subBuf.length > 0) subBlocks.push(subBuf);

    // Write sub-blocks
    subBlocks.forEach(sb => { write(sb.length); sb.forEach(b => write(b)); });
    write(0); // block terminator
  });

  // Trailer
  write(0x3B);

  const blob = new Blob([new Uint8Array(buf)], { type: 'image/gif' });
  const url = URL.createObjectURL(blob);
  downloadURL(url, 'gritpaint-animation.gif');
  URL.revokeObjectURL(url);
}
