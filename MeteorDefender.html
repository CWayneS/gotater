<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISSILE DEFENDER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    cursor: crosshair;
  }

  #ui {
    width: 800px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: #000;
    border: 1px solid #1a3a1a;
    border-bottom: none;
    position: relative;
  }

  .ui-block { text-align: center; }

  .ui-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: #2a6a2a;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .ui-value {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #00ff41;
    text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
    letter-spacing: 2px;
  }

  #wave-display { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }
  #missiles-display { color: #ff4444; text-shadow: 0 0 10px #ff4444; }

  #canvas-wrap {
    position: relative;
    width: 800px;
    height: 550px;
  }

  canvas {
    display: block;
    border: 1px solid #1a3a1a;
    box-shadow: 0 0 40px rgba(0,255,65,0.15), inset 0 0 60px rgba(0,0,0,0.5);
  }

  #scanlines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #overlay.visible { opacity: 1; pointer-events: all; }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-size: 48px;
    font-weight: 900;
    color: #00ff41;
    text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41, 0 0 80px #00ff41;
    letter-spacing: 6px;
    margin-bottom: 12px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .overlay-sub {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: #ffaa00;
    text-shadow: 0 0 10px #ffaa00;
    letter-spacing: 4px;
    margin-bottom: 40px;
  }

  .overlay-msg {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #000;
    background: #00ff41;
    border: none;
    padding: 14px 40px;
    margin-top: 20px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 20px #00ff41;
    transition: all 0.15s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn:hover {
    background: #fff;
    box-shadow: 0 0 40px #00ff41, 0 0 80px #00ff41;
    transform: scale(1.05);
  }

  #high-score-row {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: #444;
    letter-spacing: 3px;
    margin-top: 30px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .game-over-title { color: #ff4444 !important; text-shadow: 0 0 20px #ff4444, 0 0 40px #ff4444 !important; }
  .wave-clear-title { color: #ffaa00 !important; text-shadow: 0 0 20px #ffaa00, 0 0 40px #ffaa00 !important; }
</style>
</head>
<body>

<div id="ui">
  <div class="ui-block">
    <div class="ui-label">Score</div>
    <div class="ui-value" id="score-display">000000</div>
  </div>
  <div class="ui-block">
    <div class="ui-label">Wave</div>
    <div class="ui-value" id="wave-display">01</div>
  </div>
  <div class="ui-block">
    <div class="ui-label">Missiles</div>
    <div class="ui-value" id="missiles-display">30</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c" width="800" height="550"></canvas>
  <div id="scanlines"></div>
  <div id="overlay" class="visible">
    <div class="overlay-title" id="overlay-title">Meteor Defender</div>
    <div class="overlay-sub" id="overlay-sub">DEFEND THE CITIES</div>
    <div class="overlay-msg">CLICK TO FIRE</div>
    <div class="overlay-msg">PROTECT YOUR CITIES FROM DESTRUCTION</div>
    <button class="btn" id="start-btn">LAUNCH DEFENSE</button>
    <div id="high-score-row">HIGH SCORE: <span id="hi-score">000000</span></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 60;

// --- State ---
let score = 0, hiScore = 0, wave = 1, missilesLeft = 30;
let gameState = 'menu'; // menu | playing | waveclear | gameover
let waveTimer = 0;

// Game objects
let incomingMissiles = [], counterMissiles = [], explosions = [], cities = [], batteries = [];
let stars = [];

// --- Init stars ---
for (let i = 0; i < 120; i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*GROUND, b: Math.random() });
}

// --- City & Battery layout ---
function initCities() {
  cities = [];
  const positions = [80, 180, 280, 520, 620, 720];
  for (let x of positions) cities.push({ x, alive: true });
}

function initBatteries() {
  batteries = [];
  const positions = [50, 400, 750];
  const ammo = [10, 10, 10];
  for (let i = 0; i < 3; i++) batteries.push({ x: positions[i], ammo: ammo[i], alive: true });
}

// --- Wave config ---
function waveConfig(w) {
  return {
    count: 8 + w * 3,
    speed: 0.4 + w * 0.08,
    interval: Math.max(600 - w * 40, 180),
    mirvChance: Math.min(0.05 + w * 0.04, 0.4),
    smartChance: Math.min(w * 0.05, 0.35),
  };
}

let waveConf, spawnTimer = 0, spawnedCount = 0;

function startWave() {
  waveConf = waveConfig(wave);
  spawnTimer = 0;
  spawnedCount = 0;
  incomingMissiles = [];
  counterMissiles = [];
  explosions = [];
  // Refill batteries
  let totalAmmo = 10 + wave * 2;
  for (let b of batteries) { if (b.alive) b.ammo = Math.ceil(totalAmmo / batteries.filter(b=>b.alive).length); }
  missilesLeft = batteries.reduce((s,b) => s + (b.alive ? b.ammo : 0), 0);
  updateUI();
  gameState = 'playing';
}

function startGame() {
  score = 0; wave = 1;
  initCities(); initBatteries();
  startWave();
  hideOverlay();
}

function nextWave() {
  wave++;
  updateUI();
  startWave();
  hideOverlay();
}

// --- UI ---
function updateUI() {
  document.getElementById('score-display').textContent = String(score).padStart(6,'0');
  document.getElementById('wave-display').textContent = String(wave).padStart(2,'0');
  missilesLeft = batteries.reduce((s,b) => s + (b.alive ? b.ammo : 0), 0);
  document.getElementById('missiles-display').textContent = String(missilesLeft).padStart(2,'0');
}

// --- Overlay ---
function showOverlay(title, titleClass, sub, btnText, btnAction) {
  const o = document.getElementById('overlay');
  const t = document.getElementById('overlay-title');
  const s = document.getElementById('overlay-sub');
  const b = document.getElementById('start-btn');
  t.textContent = title;
  t.className = 'overlay-title ' + (titleClass||'');
  s.textContent = sub;
  b.textContent = btnText;
  b.onclick = btnAction;
  document.getElementById('hi-score').textContent = String(hiScore).padStart(6,'0');
  o.classList.add('visible');
}
function hideOverlay() {
  document.getElementById('overlay').classList.remove('visible');
}

document.getElementById('start-btn').onclick = startGame;

// --- Missile classes ---
function spawnIncoming() {
  const cfg = waveConf;
  // Pick a living city or battery as target
  const targets = [...cities.filter(c=>c.alive).map(c=>({x:c.x, y:GROUND})),
                   ...batteries.filter(b=>b.alive).map(b=>({x:b.x, y:GROUND}))];
  if (!targets.length) return;
  const target = targets[Math.floor(Math.random()*targets.length)];
  const sx = Math.random()*W;

  const isSmart = Math.random() < cfg.smartChance;
  const isMirv  = Math.random() < cfg.mirvChance;

  incomingMissiles.push({
    x: sx, y: 0,
    tx: target.x, ty: target.ty || GROUND,
    speed: cfg.speed * (0.8 + Math.random()*0.4),
    trail: [],
    smart: isSmart,
    mirv: isMirv,
    mirvAlt: 120 + Math.random()*150,
    dead: false,
    color: isSmart ? '#ff6600' : (isMirv ? '#ff00ff' : '#ff4444'),
  });
}

function spawnCounter(tx, ty) {
  // Find nearest battery with ammo
  const aliveBatteries = batteries.filter(b => b.alive && b.ammo > 0);
  if (!aliveBatteries.length) return;
  let best = aliveBatteries.reduce((a,b) => Math.abs(b.x-tx) < Math.abs(a.x-tx) ? b : a);
  best.ammo--;
  updateUI();

  counterMissiles.push({
    x: best.x, y: GROUND - 10,
    tx, ty,
    speed: 5,
    trail: [],
    dead: false,
  });
}

// --- Explosion ---
function addExplosion(x, y, r, color, duration) {
  explosions.push({ x, y, r, maxR: r, color: color||'#ffcc44', t: 0, dur: duration||45, dead: false });
}

function checkCollisions() {
  for (let e of explosions) {
    if (e.dead) continue;
    // Kill incoming missiles in radius
    for (let m of incomingMissiles) {
      if (m.dead) continue;
      const dx = m.x - e.x, dy = m.y - e.y;
      if (dx*dx+dy*dy < e.r*e.r) {
        m.dead = true;
        addExplosion(m.x, m.y, 30, m.color, 35);
        score += 25 * wave;
        updateUI();
      }
    }
  }
}

function checkGroundHits() {
  for (let m of incomingMissiles) {
    if (m.dead) continue;
    if (m.y >= GROUND) {
      m.dead = true;
      addExplosion(m.x, GROUND, 50, '#ff4444', 60);
      // Damage cities/batteries in range
      const R = 55;
      for (let c of cities) {
        if (c.alive && Math.abs(c.x - m.x) < R) { c.alive = false; }
      }
      for (let b of batteries) {
        if (b.alive && Math.abs(b.x - m.x) < R) { b.alive = false; }
      }
    }
  }
}

function checkWaveEnd() {
  if (spawnedCount >= waveConf.count && incomingMissiles.every(m=>m.dead)) {
    const alive = cities.filter(c=>c.alive).length;
    if (alive === 0) {
      endGame();
      return;
    }
    // Bonus
    const batteryBonus = batteries.reduce((s,b)=>s+(b.alive?b.ammo:0),0) * 5;
    const cityBonus = alive * 100;
    score += batteryBonus + cityBonus;
    updateUI();
    gameState = 'waveclear';
    showOverlay(
      `WAVE ${wave} CLEAR`,
      'wave-clear-title',
      `CITY BONUS: ${cityBonus}  |  AMMO BONUS: ${batteryBonus}`,
      'NEXT WAVE',
      nextWave
    );
  } else if (cities.every(c=>!c.alive)) {
    endGame();
  }
}

function endGame() {
  if (score > hiScore) hiScore = score;
  gameState = 'gameover';
  showOverlay('GAME OVER', 'game-over-title', `FINAL SCORE: ${String(score).padStart(6,'0')}`, 'PLAY AGAIN', startGame);
}

// --- Draw helpers ---
function drawGround() {
  // Horizon glow
  ctx.save();
  const grad = ctx.createLinearGradient(0, GROUND-20, 0, H);
  grad.addColorStop(0, 'rgba(0,80,0,0.3)');
  grad.addColorStop(1, 'rgba(0,20,0,0.8)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, GROUND-2, W, H-GROUND+2);

  ctx.strokeStyle = '#00ff41';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00ff41';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();
  ctx.restore();
}

function drawCity(c) {
  if (!c.alive) return;
  const x = c.x, y = GROUND;
  ctx.save();
  ctx.shadowColor = '#00ccff';
  ctx.shadowBlur = 10;

  const bldgs = [
    {dx:-18, w:12, h:28}, {dx:-4, w:10, h:38}, {dx:8, w:14, h:22}, {dx:24, w:8, h:32}
  ];
  for (let b of bldgs) {
    ctx.fillStyle = '#001a2a';
    ctx.fillRect(x+b.dx, y-b.h, b.w, b.h);
    ctx.strokeStyle = '#00ccff';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+b.dx, y-b.h, b.w, b.h);
    // Windows
    ctx.fillStyle = 'rgba(0,200,255,0.4)';
    for (let wy = y-b.h+4; wy < y-4; wy += 7) {
      for (let wx = x+b.dx+2; wx < x+b.dx+b.w-2; wx += 5) {
        if (Math.random() > 0.3) ctx.fillRect(wx, wy, 3, 4);
      }
    }
  }
  ctx.restore();
}

function drawBattery(b) {
  if (!b.alive) return;
  const x = b.x, y = GROUND;
  ctx.save();
  ctx.shadowColor = '#00ff41';
  ctx.shadowBlur = 12;

  // Base
  ctx.fillStyle = '#003300';
  ctx.fillRect(x-20, y-16, 40, 16);
  ctx.strokeStyle = '#00ff41';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x-20, y-16, 40, 16);

  // Turret dome
  ctx.beginPath();
  ctx.arc(x, y-16, 10, Math.PI, 0);
  ctx.fillStyle = '#005500';
  ctx.fill();
  ctx.stroke();

  // Barrel
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, y-16);
  ctx.lineTo(x, y-28);
  ctx.stroke();

  // Ammo count
  ctx.font = '9px Share Tech Mono';
  ctx.fillStyle = '#00ff41';
  ctx.textAlign = 'center';
  ctx.fillText(b.ammo, x, y-2);
  ctx.restore();
}

function drawIncoming(m) {
  if (m.dead) return;
  ctx.save();
  // Trail
  ctx.strokeStyle = m.color;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = m.color;
  ctx.shadowBlur = 6;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  for (let i = 0; i < m.trail.length; i++) {
    const p = m.trail[i];
    if (i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  // Head
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 12;
  ctx.fillStyle = m.color;
  ctx.beginPath();
  ctx.arc(m.x, m.y, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawCounter(m) {
  if (m.dead) return;
  ctx.save();
  ctx.strokeStyle = '#88ff44';
  ctx.lineWidth = 1;
  ctx.shadowColor = '#88ff44';
  ctx.shadowBlur = 8;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  for (let i = 0; i < m.trail.length; i++) {
    const p = m.trail[i];
    if (i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#ccff88';
  ctx.beginPath();
  ctx.arc(m.x, m.y, 2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawExplosion(e) {
  if (e.dead) return;
  const prog = e.t / e.dur;
  const r = e.maxR * Math.sin(prog * Math.PI);
  const alpha = 1 - prog;
  ctx.save();
  // Outer ring
  ctx.strokeStyle = e.color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = alpha * 0.8;
  ctx.shadowColor = e.color;
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(e.x, e.y, r, 0, Math.PI*2);
  ctx.stroke();
  // Inner fill
  const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
  grad.addColorStop(0, e.color.replace(')', ',0.5)').replace('rgb','rgba'));
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.globalAlpha = alpha * 0.4;
  ctx.fill();
  ctx.restore();
}

function drawStars() {
  ctx.save();
  for (let s of stars) {
    const blink = 0.3 + 0.7 * Math.abs(Math.sin(Date.now()*0.001*s.b + s.x));
    ctx.globalAlpha = blink * 0.8;
    ctx.fillStyle = '#aaffcc';
    ctx.fillRect(s.x, s.y, 1, 1);
  }
  ctx.restore();
}

function drawCrosshair(mx, my) {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,65,0.7)';
  ctx.lineWidth = 1;
  ctx.shadowColor = '#00ff41';
  ctx.shadowBlur = 8;
  const sz = 12;
  ctx.beginPath();
  ctx.moveTo(mx-sz, my); ctx.lineTo(mx+sz, my);
  ctx.moveTo(mx, my-sz); ctx.lineTo(mx, my+sz);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(mx, my, 6, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

// --- Update ---
let lastT = 0;
function update(dt) {
  if (gameState !== 'playing') return;

  // Spawn
  spawnTimer += dt;
  if (spawnedCount < waveConf.count && spawnTimer > waveConf.interval) {
    spawnTimer = 0;
    spawnIncoming();
    spawnedCount++;
  }

  // Move incoming
  for (let m of incomingMissiles) {
    if (m.dead) continue;
    m.trail.push({x:m.x, y:m.y});
    if (m.trail.length > 30) m.trail.shift();

    // MIRV split
    if (m.mirv && m.y > m.mirvAlt && !m._split) {
      m._split = true;
      const targets = cities.filter(c=>c.alive);
      for (let i = 0; i < 2 && i < targets.length; i++) {
        const t = targets[Math.floor(Math.random()*targets.length)];
        incomingMissiles.push({
          x:m.x, y:m.y, tx:t.x, ty:GROUND,
          speed: waveConf.speed * 0.9,
          trail: [], smart: false, mirv: false, dead: false,
          color: '#ff88ff',
        });
      }
    }

    const dx = m.tx - m.x, dy = m.ty - m.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < m.speed) { m.x = m.tx; m.y = m.ty; }
    else { m.x += dx/dist*m.speed; m.y += dy/dist*m.speed; }
  }

  // Move counters
  for (let m of counterMissiles) {
    if (m.dead) continue;
    m.trail.push({x:m.x, y:m.y});
    if (m.trail.length > 20) m.trail.shift();
    const dx = m.tx - m.x, dy = m.ty - m.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < m.speed) {
      m.dead = true;
      addExplosion(m.tx, m.ty, 55, '#44ff88', 50);
    } else { m.x += dx/dist*m.speed; m.y += dy/dist*m.speed; }
  }

  // Explosions
  for (let e of explosions) {
    e.t++;
    if (e.t >= e.dur) e.dead = true;
  }

  checkCollisions();
  checkGroundHits();
  cleanDead();
  checkWaveEnd();
}

function cleanDead() {
  incomingMissiles = incomingMissiles.filter(m=>!m.dead||m.trail.length>0);
  counterMissiles  = counterMissiles.filter(m=>!m.dead||m.trail.length>0);
  explosions       = explosions.filter(e=>!e.dead);
}

// --- Mouse ---
let mouseX = W/2, mouseY = H/2;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('click', e => {
  if (gameState !== 'playing') return;
  const r = canvas.getBoundingClientRect();
  spawnCounter(e.clientX - r.left, e.clientY - r.top);
});

// --- Draw ---
function draw() {
  // Background
  ctx.fillStyle = '#000508';
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawGround();

  for (let c of cities) drawCity(c);
  for (let b of batteries) drawBattery(b);

  for (let m of incomingMissiles) drawIncoming(m);
  for (let m of counterMissiles) drawCounter(m);
  for (let e of explosions) drawExplosion(e);

  if (gameState === 'playing') drawCrosshair(mouseX, mouseY);

  // Destroyed city rubble
  for (let c of cities) {
    if (!c.alive) {
      ctx.save();
      ctx.fillStyle = '#111';
      ctx.fillRect(c.x-22, GROUND-5, 44, 5);
      ctx.fillStyle = '#333';
      for (let i = 0; i < 6; i++) {
        const rx = c.x - 20 + i*8 + Math.sin(i*99)*3;
        ctx.fillRect(rx, GROUND - 3 - Math.abs(Math.sin(i*13))*8, 5, 8);
      }
      ctx.restore();
    }
  }
}

// --- Loop ---
function loop(t) {
  const dt = Math.min(t - lastT, 50);
  lastT = t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });
</script>
</body>
</html>
