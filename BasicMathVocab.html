<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Vocab Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drag-item {
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: none;
            user-select: none;
        }
        .drag-item:active {
            cursor: grabbing;
            transform: scale(1.1) rotate(2deg);
            z-index: 50;
        }
        .drop-zone {
            transition: all 0.3s ease;
            min-height: 95px;
            position: relative;
        }
        .correct {
            background-color: #ecfdf5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
            border-style: solid !important;
            transform: scale(1.02);
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }
        .incorrect {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Extreme Confetti */
        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 999;
            will-change: transform;
        }

        /* Tooltip Style */
        .tooltip {
            visibility: hidden;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1e293b;
            color: #fff;
            text-align: center;
            padding: 8px 12px;
            border-radius: 8px;
            z-index: 50;
            width: 180px;
            font-size: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #1e293b transparent transparent transparent;
        }
        .drop-zone:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .syntax-hint {
            display: none;
            font-family: monospace;
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #6366f1;
            margin-bottom: 6px;
        }
        .hints-on .syntax-hint {
            display: inline-block;
        }

        /* Custom scrollbar */
        #defs-container::-webkit-scrollbar { width: 6px; }
        #defs-container::-webkit-scrollbar-track { background: #f1f5f9; }
        #defs-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900 overflow-hidden">

    <div id="app" class="h-screen flex flex-col max-w-6xl mx-auto px-4 py-4">
        <!-- Header -->
        <header class="text-center mb-4 flex-none">
            <h1 class="text-3xl font-black text-indigo-600 drop-shadow-sm">MATH VOCAB QUEST</h1>
            <div class="flex items-center justify-center gap-4 mt-1">
                <p class="text-slate-500 text-sm italic">Hover definitions for examples</p>
                <div class="h-4 w-px bg-slate-300"></div>
                <label class="flex items-center cursor-pointer group">
                    <span class="mr-2 text-xs font-bold text-slate-600 uppercase tracking-tighter">Syntax Hints</span>
                    <div class="relative">
                        <input type="checkbox" id="hint-toggle" class="sr-only" onchange="toggleHints()">
                        <div class="block bg-slate-300 w-10 h-6 rounded-full group-hover:bg-slate-400 transition-colors"></div>
                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-200 shadow-sm"></div>
                    </div>
                </label>
            </div>
        </header>

        <!-- World Navigation -->
        <div class="flex justify-center gap-2 mb-4 flex-none">
            <button onclick="switchWorld(0)" id="nav-0" class="px-4 py-2 rounded-lg font-bold transition-all shadow-sm">World 1</button>
            <button onclick="switchWorld(1)" id="nav-1" class="px-4 py-2 rounded-lg font-bold transition-all shadow-sm">World 2</button>
            <button onclick="switchWorld(2)" id="nav-2" class="px-4 py-2 rounded-lg font-bold transition-all shadow-sm">World 3</button>
            <button onclick="switchWorld(3)" id="nav-3" class="px-4 py-2 rounded-lg font-bold transition-all shadow-sm">World 4</button>
        </div>

        <!-- Main Game Container -->
        <div class="bg-white rounded-2xl shadow-xl p-4 flex-1 flex flex-col overflow-hidden min-h-0 border border-slate-200">
            <div id="world-info" class="mb-4 flex justify-between items-center border-b pb-3 flex-none">
                <div>
                    <h2 id="world-title" class="text-xl font-bold text-slate-800 leading-tight">World Title</h2>
                    <p id="world-desc" class="text-slate-500 text-xs">Description goes here.</p>
                </div>
                <div class="text-right">
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Progress</div>
                    <div id="progress-text" class="text-2xl font-black text-indigo-600 leading-none">0/0</div>
                </div>
            </div>

            <div class="flex-1 flex flex-col md:flex-row gap-4 overflow-hidden">
                <!-- Terms Palette -->
                <div class="w-full md:w-1/4 bg-slate-50 rounded-xl p-3 border border-slate-100 overflow-y-auto">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-3 text-center">Drag Terms</h3>
                    <div id="terms-container" class="flex flex-wrap md:flex-col gap-2 justify-center">
                        <!-- Loaded via JS -->
                    </div>
                </div>

                <!-- Definitions Grid -->
                <div id="defs-container" class="w-full md:w-3/4 overflow-y-auto pr-2 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 content-start pt-8">
                    <!-- Loaded via JS -->
                </div>
            </div>

            <!-- Footer / Feedback -->
            <div class="mt-4 flex items-center justify-center flex-none min-h-[40px]">
                <div id="victory-msg" class="hidden text-emerald-600 font-bold text-lg animate-bounce flex items-center gap-2">
                    <span class="text-2xl">✨</span>
                    <span>MATH MASTERPIECE!</span>
                    <span class="text-2xl">✨</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SOUND ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'success') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.2);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'victory') {
                [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = 'triangle';
                    o.frequency.setValueAtTime(freq, now + (i * 0.1));
                    g.gain.setValueAtTime(0.1, now + (i * 0.1));
                    g.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.5);
                    o.start(now + (i * 0.1));
                    o.stop(now + (i * 0.1) + 0.5);
                });
            }
        }

        // --- X10 CONFETTI CELEBRATION ---
        function createConfetti() {
            const colors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#06b6d4', '#ffffff', '#fb7185', '#38bdf8'];

            // 10 Wave sequence
            for (let wave = 0; wave < 10; wave++) {
                setTimeout(() => {
                    const count = 50; // High particle count per wave
                    for (let i = 0; i < count; i++) {
                        const el = document.createElement('div');
                        el.className = 'confetti';

                        // Alternate sides or launch from middle
                        const side = Math.random() < 0.4 ? 0 : (Math.random() > 0.6 ? 100 : 50);

                        el.style.left = side === 0 ? '-20px' : (side === 100 ? 'calc(100% + 20px)' : '50%');
                        el.style.bottom = '-20px';
                        el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                        // Massive velocity for "X10" feel
                        let velocityX;
                        if (side === 0) velocityX = (Math.random() * 15 + 8);
                        else if (side === 100) velocityX = -(Math.random() * 15 + 8);
                        else velocityX = (Math.random() - 0.5) * 20;

                        let velocityY = Math.random() * 25 + 15;
                        const gravity = 0.45;
                        const rotationSpeed = (Math.random() - 0.5) * 40;

                        let posX = side === 0 ? -20 : (side === 100 ? window.innerWidth + 20 : window.innerWidth / 2);
                        let posY = 0;
                        let angle = Math.random() * 360;

                        document.body.appendChild(el);

                        let start = null;
                        function step(timestamp) {
                            if (!start) start = timestamp;
                            const progress = timestamp - start;

                            velocityY -= gravity;
                            posX += velocityX;
                            posY += velocityY;
                            angle += rotationSpeed;

                            el.style.transform = `translate(${posX}px, ${-posY}px) rotate(${angle}deg)`;

                            // Cleanup logic
                            if (posY > -200 && progress < 5000) {
                                requestAnimationFrame(step);
                            } else {
                                el.remove();
                            }
                        }
                        requestAnimationFrame(step);
                    }
                }, wave * 180); // Rapid succession
            }
        }

        // --- GAME LOGIC ---
        const syntaxClues = {
            "Expression": "3x + 5", "Equation": "x + 2 = 10", "Operator": "+ − × ÷",
            "Numerator": "n / —", "Denominator": "— / d", "Absolute Value": "| x |",
            "Integer": "...-1, 0, 1...", "Rational Number": "a / b", "Inequality": "< > ≤ ≥",
            "Variable": "x, y, n", "Coefficient": "5x (the 5)", "Constant of Proportionality": "y = kx",
            "Supplementary": "∠A + ∠B = 180°", "Complementary": "∠A + ∠B = 90°"
        };

        const gameData = [
            {
                title: "World 1: The Building Blocks",
                desc: "Fundamental language of math problems.",
                vocab: [
                    { t: "Expression", d: "A math phrase without an equal sign.", e: "Ex: 4x + 7" },
                    { t: "Equation", d: "A statement that two expressions are equal.", e: "Ex: 2x + 1 = 5" },
                    { t: "Operator", d: "Symbols like +, -, ×, ÷.", e: "Ex: The '+' in 5+2" },
                    { t: "Sum", d: "The result of addition.", e: "Ex: 10 is the sum of 7+3" },
                    { t: "Difference", d: "The result of subtraction.", e: "Ex: 4 is the diff of 9-5" },
                    { t: "Product", d: "The result of multiplication.", e: "Ex: 20 is the prod of 4×5" },
                    { t: "Quotient", d: "The result of division.", e: "Ex: 3 is the quot of 12÷4" },
                    { t: "Numerator", d: "The 'part' or top number.", e: "Ex: The 3 in 3/4" },
                    { t: "Denominator", d: "The 'whole' or bottom number.", e: "Ex: The 4 in 3/4" },
                    { t: "Factor", d: "Divides another number exactly.", e: "Ex: 3 is a factor of 12" },
                    { t: "Multiple", d: "The result of multiplying by an integer.", e: "Ex: 15 is a multiple of 5" }
                ]
            },
            {
                title: "World 2: Number Systems",
                desc: "Rational numbers and integers.",
                vocab: [
                    { t: "Rational Number", d: "Any number written as a fraction.", e: "Ex: 0.75 or 1/2" },
                    { t: "Integer", d: "A whole number (positive, negative, zero).", e: "Ex: -5, 0, or 12" },
                    { t: "Absolute Value", d: "Distance from zero (always positive).", e: "Ex: |-7| = 7" },
                    { t: "Additive Inverse", d: "The opposite (sum is zero).", e: "Ex: 4 and -4" }
                ]
            },
            {
                title: "World 3: Ratios & Proportionality",
                desc: "Rates and percent relationships.",
                vocab: [
                    { t: "Unit Rate", d: "A rate with a denominator of 1.", e: "Ex: 60 miles / 1 hour" },
                    { t: "Constant of Proportionality", d: "The ratio (k) in y = kx.", e: "Ex: If y=3x, then k=3" },
                    { t: "Percent of Change", d: "Comparison to the original value.", e: "Ex: From $10 to $12 is 20%" }
                ]
            },
            {
                title: "World 4: Algebra & Geometry",
                desc: "Variables, inequalities, and angles.",
                vocab: [
                    { t: "Variable", d: "A letter for an unknown value.", e: "Ex: 'x' or 'n'" },
                    { t: "Coefficient", d: "The number multiplied by a variable.", e: "Ex: The 8 in 8x" },
                    { t: "Inequality", d: "Uses symbols like <, >, ≤, or ≥.", e: "Ex: x + 2 > 10" },
                    { t: "Supplementary", d: "Two angles that add up to 180°.", e: "Ex: 110° and 70°" },
                    { t: "Complementary", d: "Two angles that add up to 90°.", e: "Ex: 30° and 60°" }
                ]
            }
        ];

        let currentWorld = 0;
        let correctMatches = 0;
        let draggedElement = null;
        let hintsActive = false;

        function toggleHints() {
            hintsActive = !hintsActive;
            const container = document.getElementById('defs-container');
            const dot = document.querySelector('.dot');
            if (hintsActive) {
                container.classList.add('hints-on');
                dot.style.transform = 'translateX(1rem)';
            } else {
                container.classList.remove('hints-on');
                dot.style.transform = 'translateX(0)';
            }
        }

        function initWorld(index) {
            currentWorld = index;
            correctMatches = 0;
            const world = gameData[index];

            document.getElementById('world-title').innerText = world.title;
            document.getElementById('world-desc').innerText = world.desc;
            document.getElementById('victory-msg').classList.add('hidden');

            updateNavUI(index);

            const termsContainer = document.getElementById('terms-container');
            const defsContainer = document.getElementById('defs-container');
            termsContainer.innerHTML = '';
            defsContainer.innerHTML = '';

            const shuffledVocab = [...world.vocab].sort(() => Math.random() - 0.5);
            shuffledVocab.forEach(item => {
                const div = document.createElement('div');
                div.className = 'drag-item bg-indigo-600 text-white px-3 py-2 rounded-lg font-bold text-sm shadow-md text-center border-b-4 border-indigo-800 hover:bg-indigo-500';
                div.innerText = item.t;
                div.draggable = true;
                div.addEventListener('dragstart', handleDragStart);
                termsContainer.appendChild(div);
            });

            const shuffledDefs = [...world.vocab].sort(() => Math.random() - 0.5);
            shuffledDefs.forEach(item => {
                const dropZone = document.createElement('div');
                dropZone.className = 'drop-zone border-2 border-dashed border-slate-200 rounded-xl p-3 bg-slate-50 flex flex-col items-center justify-center text-center text-xs text-slate-600 font-medium leading-tight hover:border-indigo-300 transition-colors shadow-inner';
                dropZone.dataset.answer = item.t;

                const clue = syntaxClues[item.t] || "...";
                const syntaxDiv = document.createElement('div');
                syntaxDiv.className = 'syntax-hint';
                syntaxDiv.innerText = clue;

                const textSpan = document.createElement('span');
                textSpan.innerText = item.d;

                dropZone.appendChild(syntaxDiv);
                dropZone.appendChild(textSpan);

                const tooltip = document.createElement('div');
                tooltip.className = 'tooltip';
                tooltip.innerText = item.e;
                dropZone.appendChild(tooltip);

                dropZone.addEventListener('dragover', e => e.preventDefault());
                dropZone.addEventListener('drop', handleDrop);

                defsContainer.appendChild(dropZone);
            });

            updateProgress();
        }

        function handleDragStart(e) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            draggedElement = e.target;
            e.dataTransfer.setData('text/plain', e.target.innerText);
        }

        function handleDrop(e) {
            e.preventDefault();
            const term = e.dataTransfer.getData('text/plain');
            const dropZone = e.currentTarget;

            if (dropZone.dataset.answer === term) {
                const definitionText = dropZone.querySelector('span').innerText;
                dropZone.innerHTML = `
                    <div class="flex flex-col items-center animate-in fade-in scale-in duration-300">
                        <span class="text-[10px] text-emerald-600 uppercase font-black mb-1 bg-emerald-100 px-2 py-0.5 rounded shadow-sm">${term}</span>
                        <span class="text-xs text-emerald-800 px-2">${definitionText}</span>
                    </div>`;
                dropZone.classList.add('correct');
                draggedElement.style.opacity = '0';
                draggedElement.style.pointerEvents = 'none';

                playSound('success');
                correctMatches++;
                updateProgress();

                if (correctMatches === gameData[currentWorld].vocab.length) {
                    playSound('victory');
                    createConfetti();
                    document.getElementById('victory-msg').classList.remove('hidden');
                }
            } else {
                playSound('error');
                dropZone.classList.add('incorrect');
                setTimeout(() => dropZone.classList.remove('incorrect'), 400);
            }
        }

        function updateProgress() {
            const total = gameData[currentWorld].vocab.length;
            document.getElementById('progress-text').innerText = `${correctMatches}/${total}`;
        }

        function updateNavUI(index) {
            for(let i=0; i<4; i++) {
                const btn = document.getElementById(`nav-${i}`);
                if (i === index) {
                    btn.className = "px-4 py-2 rounded-lg font-bold transition-all shadow-md bg-indigo-600 text-white scale-105 z-10";
                } else {
                    btn.className = "px-4 py-2 rounded-lg font-bold transition-all shadow-sm bg-white text-slate-600 hover:bg-slate-50";
                }
            }
        }

        function switchWorld(index) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            initWorld(index);
        }

        window.onload = () => initWorld(0);
    </script>
</body>
</html>
